<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tornei — Play Padel Biccari</title>
<meta name="theme-color" content="#0F5132">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --verde:#1a6b2a;--verde2:#228b22;--verde3:#2d9e4e;--verde-light:#e8f5e9;
  --oro:#b8860b;--oro2:#d4a017;--bianco:#1c2b1e;--grigio2:#6b7e6d;
  --card-bg:#ffffff;--surface:#f0ece4;--border:rgba(28,43,30,0.10);
  --danger:#c0392b;--radius:14px;--radius-lg:22px;--bg-page:#f4f1eb;
  --shadow:0 4px 24px rgba(28,43,30,0.09);
  --shadow-lg:0 12px 48px rgba(28,43,30,0.16);
  --shadow-xl:0 24px 80px rgba(28,43,30,0.20);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg-page);color:var(--bianco);min-height:100vh;}

/* ─── TOPBAR ─── */
#topbar{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:rgba(244,241,235,0.88);backdrop-filter:blur(28px) saturate(1.8);border-bottom:1px solid rgba(28,43,30,0.08);box-shadow:0 4px 20px rgba(28,43,30,0.05);}
.topbar-logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
.topbar-logo img{width:32px;height:32px;border-radius:6px;}
.topbar-logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--verde);letter-spacing:1px;}
.back-btn{display:flex;align-items:center;gap:8px;background:none;border:1.5px solid var(--border);color:var(--bianco);padding:8px 16px;border-radius:50px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;text-decoration:none;}
.back-btn:hover{background:var(--verde-light);border-color:var(--verde);color:var(--verde);}
#user-chip{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:50px;padding:5px 14px 5px 5px;font-size:14px;font-weight:500;}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--verde),var(--verde2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;}
main{padding-top:64px;}

/* ─── CINEMATIC HERO ─── */
.tornei-hero{
  background:#060e06;
  padding:5rem 2rem 4rem;text-align:center;position:relative;overflow:hidden;
  min-height:340px; display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.hero-particles{position:absolute;inset:0;pointer-events:none;}
.hero-particle{
  position:absolute;border-radius:50%;
  animation:particleDrift linear infinite;
  opacity:0;
}
@keyframes particleDrift{
  0%{transform:translateY(100%) scale(0);opacity:0;}
  10%{opacity:1;}
  90%{opacity:0.6;}
  100%{transform:translateY(-120vh) scale(1.5);opacity:0;}
}
.hero-glow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:800px;height:800px;
  background:radial-gradient(circle,rgba(26,107,42,0.22) 0%,transparent 65%);
  pointer-events:none;animation:glowPulse 4s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{transform:translate(-50%,-50%) scale(1);}50%{transform:translate(-50%,-50%) scale(1.15);}}
.hero-scan{
  position:absolute;top:-2px;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,rgba(74,222,128,0.8),transparent);
  animation:scanLine 3s linear infinite;
}
@keyframes scanLine{from{top:-2px;}to{top:100%;}}
.hero-eyebrow{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(74,222,128,0.7);margin-bottom:1.2rem;position:relative;display:flex;align-items:center;justify-content:center;gap:12px;}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';width:40px;height:1px;background:linear-gradient(90deg,transparent,rgba(74,222,128,0.5));}
.hero-eyebrow::after{background:linear-gradient(270deg,transparent,rgba(74,222,128,0.5));}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(72px,12vw,140px);color:white;letter-spacing:6px;line-height:0.85;position:relative;text-shadow:0 0 80px rgba(74,222,128,0.2);}
.hero-title .accent{color:#4ade80;text-shadow:0 0 40px rgba(74,222,128,0.6);}
.hero-sub{font-size:15px;color:rgba(255,255,255,0.5);margin-top:1.2rem;letter-spacing:1px;position:relative;}
.hero-live-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(230,57,70,0.15);border:1px solid rgba(230,57,70,0.4);
  color:#e63946;padding:6px 14px;border-radius:50px;
  font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  margin-top:1rem;position:relative;
}
.hero-live-dot{width:7px;height:7px;border-radius:50%;background:#e63946;animation:livePulse 1.2s ease-in-out infinite;}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(230,57,70,0.6);}50%{box-shadow:0 0 0 6px transparent;}}

/* ─── FILTER BAR ─── */
.filter-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:1.5rem 2rem 0;}
.filter-tab{background:var(--card-bg);border:1.5px solid var(--border);color:var(--grigio2);padding:8px 20px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.22s;}
.filter-tab:hover{background:var(--verde-light);border-color:var(--verde);color:var(--verde);}
.filter-tab.active{background:linear-gradient(135deg,var(--verde),var(--verde2));border-color:transparent;color:white;box-shadow:0 4px 14px rgba(26,107,42,0.3);}

/* ─── TORNEI GRID ─── */
.tornei-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.5rem;padding:2rem;max-width:1200px;margin:0 auto;}

/* ─── TORNEO CARD ─── */
.torneo-card{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);box-shadow:var(--shadow);cursor:pointer;position:relative;}
.torneo-card:hover{transform:translateY(-8px) scale(1.01);box-shadow:var(--shadow-xl);border-color:var(--verde2);}
.torneo-card-header{padding:1.5rem 1.5rem 1rem;background:linear-gradient(135deg,#0a1a0a,#1a3a1a);position:relative;overflow:hidden;}
.torneo-card-header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(74,222,128,0.12) 0%,transparent 70%);}
.torneo-sport-icon{font-size:36px;margin-bottom:0.75rem;display:block;}
.torneo-card-name{font-size:20px;font-weight:700;color:white;margin-bottom:4px;}
.torneo-card-desc{font-size:13px;color:rgba(255,255,255,0.55);}
.torneo-card-body{padding:1.25rem 1.5rem;}
.torneo-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.torneo-stat{background:var(--surface);border-radius:10px;padding:10px 8px;text-align:center;}
.torneo-stat-val{font-size:18px;font-weight:800;color:var(--verde);}
.torneo-stat-lbl{font-size:10px;color:var(--grigio2);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}
.torneo-progress-bar{background:var(--surface);border-radius:50px;height:6px;overflow:hidden;margin-bottom:1rem;}
.torneo-progress-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--verde),var(--verde3));transition:width 0.6s ease;}
.torneo-card-footer{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1.5rem 1.25rem;}

/* ─── STATUS BADGES ─── */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:50px;font-size:12px;font-weight:700;}
.status-open{background:rgba(26,107,42,0.12);color:var(--verde);}
.status-open::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--verde);display:inline-block;animation:pulse 1.5s infinite;}
.status-closed{background:rgba(184,134,11,0.12);color:var(--oro);}
.status-ongoing{background:rgba(230,57,70,0.1);color:#e63946;}
.status-finished{background:var(--surface);color:var(--grigio2);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.btn-vai{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--verde),var(--verde2));color:white;border:none;padding:8px 18px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 12px rgba(26,107,42,0.3);}
.btn-vai:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(26,107,42,0.4);}

/* ─── DETAIL PAGE ─── */
#detail-page{display:none;padding:2rem;max-width:1300px;margin:0 auto;}

/* ─── CINEMATIC DETAIL HERO ─── */
.detail-hero{
  background:linear-gradient(135deg,#060e06 0%,#0a1a0a 40%,#0f2a14 100%);
  border-radius:var(--radius-lg);padding:3rem;margin-bottom:2rem;
  position:relative;overflow:hidden;
  border:1px solid rgba(74,222,128,0.1);
}
.detail-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:400px;height:400px;background:radial-gradient(circle,rgba(74,222,128,0.1) 0%,transparent 70%);pointer-events:none;}
.detail-hero::after{content:'';position:absolute;bottom:-40px;left:-40px;width:300px;height:300px;background:radial-gradient(circle,rgba(26,107,42,0.12) 0%,transparent 70%);pointer-events:none;}
.detail-hero-scan{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(74,222,128,0.5),transparent);animation:scanLine 4s linear infinite;}
.detail-hero-sport{font-size:56px;margin-bottom:1rem;display:block;filter:drop-shadow(0 0 20px rgba(74,222,128,0.4));animation:sportFloat 3s ease-in-out infinite;}
@keyframes sportFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.detail-hero-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,7vw,80px);color:white;letter-spacing:3px;text-shadow:0 0 60px rgba(74,222,128,0.2);line-height:1;}
.detail-hero-meta{font-size:14px;color:rgba(255,255,255,0.5);margin-top:0.5rem;letter-spacing:0.5px;}
.detail-hero-stats{display:flex;gap:1rem;margin-top:1.5rem;flex-wrap:wrap;}
.detail-stat{background:rgba(255,255,255,0.05);border:1px solid rgba(74,222,128,0.15);border-radius:14px;padding:14px 20px;text-align:center;min-width:80px;backdrop-filter:blur(10px);transition:all 0.3s;}
.detail-stat:hover{background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.3);}
.detail-stat-val{font-size:24px;font-weight:800;color:#4ade80;}
.detail-stat-lbl{font-size:11px;color:rgba(255,255,255,0.4);margin-top:3px;text-transform:uppercase;letter-spacing:1px;}

/* ─── TABS ─── */
.detail-tabs{display:flex;gap:4px;background:var(--surface);border-radius:50px;padding:4px;margin-bottom:2rem;width:fit-content;overflow-x:auto;}
.detail-tab{padding:10px 24px;border-radius:50px;font-size:14px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--grigio2);transition:all 0.22s;white-space:nowrap;}
.detail-tab.active{background:linear-gradient(135deg,var(--verde),var(--verde2));color:white;box-shadow:0 4px 12px rgba(26,107,42,0.3);}

/* ─── ISCRITTI ─── */
.iscritti-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:1.5rem;}
.iscritto-card{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);transition:all 0.2s;animation:cardIn 0.4s ease both;}
@keyframes cardIn{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.iscritto-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);}
.iscritto-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--verde),var(--verde2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:white;flex-shrink:0;}
.iscritto-name{font-size:14px;font-weight:600;}

/* ─── CINEMATIC BRACKET ─── */
.bracket-scene{
  background:linear-gradient(135deg,#060e06,#0a1a0a,#060e06);
  border-radius:var(--radius-lg);padding:2rem;overflow:hidden;
  border:1px solid rgba(74,222,128,0.08);position:relative;
}
.bracket-scene::before{
  content:'BRACKET';
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Bebas Neue',sans-serif;font-size:200px;
  color:rgba(74,222,128,0.02);letter-spacing:20px;pointer-events:none;
  white-space:nowrap;
}
.bracket-scroll{overflow-x:auto;padding-bottom:1rem;-webkit-overflow-scrolling:touch;}
.bracket-stage{display:flex;align-items:stretch;gap:0;min-width:fit-content;position:relative;}

/* ─── ROUND COLUMN ─── */
.b-round{display:flex;flex-direction:column;min-width:200px;padding:0 20px;position:relative;}
.b-round-title{
  text-align:center;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:3px;
  color:rgba(74,222,128,0.6);margin-bottom:20px;
  border-bottom:1px solid rgba(74,222,128,0.15);padding-bottom:10px;
}
.b-round-matches{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:0;}

/* ─── MATCH CARD ─── */
.b-match{
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(74,222,128,0.15);
  border-radius:12px;overflow:hidden;margin:10px 0;
  transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;cursor:default;
  animation:matchIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  backdrop-filter:blur(10px);
}
@keyframes matchIn{from{opacity:0;transform:scale(0.8) translateX(-20px);}to{opacity:1;transform:scale(1) translateX(0);}}
.b-match:hover{transform:scale(1.04);border-color:rgba(74,222,128,0.4);box-shadow:0 0 30px rgba(74,222,128,0.1);}
.b-match.done{border-color:rgba(74,222,128,0.35);background:rgba(26,107,42,0.08);}
.b-match.final-match{
  border-color:rgba(212,160,23,0.5);
  background:rgba(184,134,11,0.08);
  box-shadow:0 0 40px rgba(184,134,11,0.15);
}
.b-match.final-match::before{
  content:'🏆';position:absolute;top:-16px;left:50%;transform:translateX(-50%);
  font-size:24px;animation:trophyFloat 2s ease-in-out infinite;
}
@keyframes trophyFloat{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-6px);}}

/* ─── MATCH PLAYER ROW ─── */
.b-player{
  display:flex;align-items:center;gap:10px;padding:12px 14px;
  transition:all 0.3s;position:relative;overflow:hidden;
}
.b-player+.b-player{border-top:1px solid rgba(255,255,255,0.06);}
.b-player::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:0;
  background:linear-gradient(90deg,rgba(74,222,128,0.12),transparent);
  transition:width 0.4s ease;
}
.b-player.winner::before{width:100%;}
.b-player.loser{opacity:0.35;}
.b-player.tbd{opacity:0.4;}

.b-avatar{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,rgba(74,222,128,0.3),rgba(26,107,42,0.5));
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;color:rgba(255,255,255,0.9);
  border:1px solid rgba(74,222,128,0.3);
  transition:all 0.3s;
}
.b-player.winner .b-avatar{
  background:linear-gradient(135deg,#d4a017,#b8860b);
  border-color:#d4a017;
  box-shadow:0 0 12px rgba(212,160,23,0.5);
  transform:scale(1.1);
}
.b-player.tbd .b-avatar{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.1);}

.b-name{
  font-size:13px;font-weight:600;flex:1;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  color:rgba(255,255,255,0.8);transition:color 0.3s;
}
.b-player.winner .b-name{color:#4ade80;font-weight:800;}
.b-player.tbd .b-name{color:rgba(255,255,255,0.3);font-style:italic;font-weight:400;}

.b-score{
  font-size:17px;font-weight:900;min-width:30px;text-align:center;
  border-radius:8px;padding:3px 8px;
  color:rgba(255,255,255,0.3);
  background:rgba(255,255,255,0.05);
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.b-player.winner .b-score{
  color:white;
  background:linear-gradient(135deg,var(--verde),var(--verde2));
  box-shadow:0 0 16px rgba(74,222,128,0.4);
  animation:scorePopIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes scorePopIn{from{transform:scale(0) rotate(-10deg);opacity:0;}to{transform:scale(1) rotate(0deg);opacity:1;}}
.b-player.loser .b-score{color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.03);}

/* ─── SVG CONNECTORS ─── */
.bracket-lines-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible;}

/* ─── WINNER CINEMATIC BANNER ─── */
.winner-cinema{
  background:linear-gradient(135deg,#060e06,#0a1a0a);
  border-radius:var(--radius-lg);padding:4rem 2rem;
  text-align:center;margin-bottom:2rem;
  position:relative;overflow:hidden;
  border:1px solid rgba(212,160,23,0.2);
  animation:winnerReveal 1s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes winnerReveal{from{opacity:0;transform:scale(0.8);}to{opacity:1;transform:scale(1);}}
.winner-cinema::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 50%,rgba(212,160,23,0.08),transparent 60%);}
.winner-rays{position:absolute;inset:0;pointer-events:none;}
.winner-ray{
  position:absolute;top:50%;left:50%;
  width:2px;background:linear-gradient(to top,transparent,rgba(212,160,23,0.15),transparent);
  transform-origin:0 0;
  animation:rayRotate 8s linear infinite;
}
@keyframes rayRotate{from{transform:rotate(0deg) translateY(-200px);}to{transform:rotate(360deg) translateY(-200px);}}
.winner-trophy-big{font-size:80px;display:block;margin-bottom:1rem;animation:trophyBig 1s cubic-bezier(0.34,1.56,0.64,1) 0.3s both,trophyFloat2 3s ease-in-out 1.3s infinite;}
@keyframes trophyBig{from{transform:scale(0) rotate(-20deg);opacity:0;}to{transform:scale(1) rotate(0deg);opacity:1;}}
@keyframes trophyFloat2{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-12px) scale(1.05);}}
.winner-tag{font-size:11px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:rgba(212,160,23,0.7);margin-bottom:0.5rem;}
.winner-nome{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,8vw,96px);color:white;letter-spacing:4px;text-shadow:0 0 60px rgba(212,160,23,0.4);animation:nameReveal 0.8s ease 0.6s both;}
@keyframes nameReveal{from{opacity:0;transform:translateY(20px);letter-spacing:20px;}to{opacity:1;transform:translateY(0);letter-spacing:4px;}}
.winner-confetti-piece{position:absolute;width:8px;height:8px;animation:confettiFall linear infinite;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(500px) rotate(720deg);opacity:0;}}

/* ─── GIRONI ─── */
.gironi-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;}
.girone-card{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);animation:cardIn 0.4s ease both;}
.girone-header{background:linear-gradient(135deg,var(--verde),var(--verde2));padding:1rem 1.25rem;color:white;font-size:15px;font-weight:700;}
.girone-table{width:100%;border-collapse:collapse;}
.girone-table th{background:var(--surface);padding:8px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--grigio2);text-align:center;}
.girone-table th:first-child{text-align:left;}
.girone-table td{padding:10px 12px;font-size:13px;border-top:1px solid var(--border);text-align:center;}
.girone-table td:first-child{text-align:left;font-weight:600;}
.girone-table tr:first-child td{background:rgba(26,107,42,0.06);}
.girone-table tr:first-child td:first-child{color:var(--verde);}

/* ─── PARTITE LIST ─── */
.matches-list{display:flex;flex-direction:column;gap:12px;}
.match-item{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;box-shadow:var(--shadow);transition:all 0.2s;animation:cardIn 0.3s ease both;}
.match-item:hover{border-color:var(--verde2);box-shadow:var(--shadow-lg);}
.match-teams{display:flex;align-items:center;gap:12px;flex:1;}
.match-team{font-size:14px;font-weight:600;flex:1;}
.match-team.right{text-align:right;}
.match-team.winner{color:var(--verde);}
.match-vs-badge{background:var(--surface);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;color:var(--grigio2);}
.match-score-display{font-size:22px;font-weight:800;color:var(--bianco);background:var(--surface);border-radius:10px;padding:6px 16px;letter-spacing:2px;}
.match-round-badge{background:rgba(26,107,42,0.1);color:var(--verde);padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;}
.score-input-row{display:flex;align-items:center;gap:8px;}
.score-inp{width:48px;height:40px;text-align:center;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;font-size:18px;font-weight:700;color:var(--bianco);font-family:inherit;}
.score-inp:focus{outline:none;border-color:var(--verde);background:white;}
.btn-save{background:linear-gradient(135deg,var(--verde),var(--verde2));color:white;border:none;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 3px 10px rgba(26,107,42,0.3);transition:all 0.2s;}
.btn-save:hover{transform:translateY(-1px);}

/* ─── ADMIN PANEL ─── */
.admin-panel{background:linear-gradient(135deg,#fffdf5,#f5fdf5);border:1.5px solid rgba(184,134,11,0.2);border-radius:var(--radius-lg);padding:2rem;margin-bottom:2rem;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.admin-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--oro),var(--oro2),var(--verde3));}
.admin-title{font-size:15px;font-weight:700;color:var(--bianco);margin-bottom:1.25rem;display:flex;align-items:center;gap:8px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--grigio2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.form-input,.form-select{width:100%;padding:10px 14px;background:white;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--bianco);font-family:inherit;transition:all 0.2s;}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--verde);box-shadow:0 0 0 3px rgba(26,107,42,0.1);}

/* ─── BUTTONS ─── */
.btn-main{background:linear-gradient(135deg,var(--verde),var(--verde2));color:white;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:600;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(26,107,42,0.3);transition:all 0.25s;}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,107,42,0.38);}
.btn-secondary{background:var(--card-bg);border:1.5px solid var(--border);color:var(--bianco);padding:10px 20px;border-radius:50px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-block;}
.btn-secondary:hover{background:var(--verde-light);border-color:var(--verde);color:var(--verde);}
.btn-danger{background:rgba(192,57,43,0.08);border:1.5px solid rgba(192,57,43,0.3);color:var(--danger);padding:8px 16px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-iscriviti{background:linear-gradient(135deg,var(--verde),var(--verde2));color:white;border:none;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(26,107,42,0.3);transition:all 0.2s;}
.btn-iscriviti:hover{transform:translateY(-2px);}
.btn-iscriviti:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-iscritto{background:rgba(26,107,42,0.1);color:var(--verde);border:1.5px solid rgba(26,107,42,0.2);padding:8px 18px;border-radius:50px;font-size:14px;font-weight:600;}

/* ─── EMPTY ─── */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--grigio2);}
.empty-state .emoji{font-size:64px;margin-bottom:1rem;display:block;}
.empty-state h3{font-size:20px;font-weight:700;color:var(--bianco);margin-bottom:0.5rem;}

/* ─── TOAST & LOADING ─── */
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(24px);background:#1c2b1e;color:white;padding:13px 28px;border-radius:50px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);z-index:9999;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.25);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#loading-overlay{position:fixed;inset:0;background:rgba(244,241,235,0.85);backdrop-filter:blur(8px);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:1rem;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--verde);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ─── PODIO ─── */
.podio{display:flex;align-items:flex-end;justify-content:center;gap:1rem;padding:2rem 0;margin-bottom:2rem;}
.podio-step{display:flex;flex-direction:column;align-items:center;gap:8px;}
.podio-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:white;}
.podio-avatar.gold{background:linear-gradient(135deg,#b8860b,#d4a017);box-shadow:0 4px 16px rgba(184,134,11,0.4);}
.podio-avatar.silver{background:linear-gradient(135deg,#8a9ab0,#aabbc0);}
.podio-avatar.bronze{background:linear-gradient(135deg,#8b4513,#cd853f);}
.podio-name{font-size:13px;font-weight:700;text-align:center;}
.podio-medal{font-size:28px;}
.podio-bar{border-radius:12px 12px 0 0;width:80px;}
.podio-bar.gold{background:linear-gradient(180deg,rgba(212,160,23,0.2),rgba(212,160,23,0.05));height:100px;}
.podio-bar.silver{background:linear-gradient(180deg,rgba(170,187,192,0.2),rgba(170,187,192,0.05));height:70px;}
.podio-bar.bronze{background:linear-gradient(180deg,rgba(205,133,63,0.2),rgba(205,133,63,0.05));height:50px;}

@media(max-width:768px){
  .tornei-grid{grid-template-columns:1fr;padding:1rem;}
  .detail-tabs{overflow-x:auto;}
  .b-round{min-width:160px;padding:0 10px;}
  .b-name{font-size:11px;}
  .match-item{flex-direction:column;}
  #detail-page{padding:1rem;}
}

<main>
  <!-- LIST PAGE -->
  <div id="list-page">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig={apiKey:"AIzaSyDedRUBLyAT6yRxQ4ZJWwwJIlVvFyLEW8Q",authDomain:"playpadel-biccari.firebaseapp.com",projectId:"playpadel-biccari",storageBucket:"playpadel-biccari.firebasestorage.app",messagingSenderId:"239722542498",appId:"1:239722542498:web:c085d112c3c560686c2efb"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore(),auth=firebase.auth();
var currentUser=null,allTornei=[],currentTorneo=null,currentFilter='all';

auth.onAuthStateChanged(async function(u){
  if(u){
    try{
      const doc=await db.collection('users').doc(u.uid).get();
      const data=doc.exists?doc.data():{};
      currentUser=Object.assign({uid:u.uid,email:u.email},data);
      document.getElementById('user-chip').style.display='flex';
      document.getElementById('user-initial').textContent=(currentUser.name||'U')[0].toUpperCase();
      document.getElementById('user-name-chip').textContent=currentUser.name||'Utente';
    }catch(e){}
  }else{
    currentUser=null;
    document.getElementById('user-chip').style.display='none';
  }
  const urlParams=new URLSearchParams(window.location.search);
  const tid=urlParams.get('id');
  await loadTornei();
  if(tid)openTorneoById(tid);
});

function showToast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.style.background=err?'#c0392b':'#1c2b1e';t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function showLoading(){document.getElementById('loading-overlay').style.display='flex';}
function hideLoading(){document.getElementById('loading-overlay').style.display='none';}
function sportEmoji(s){return{padel:'🏓',calcetto:'⚽',tennis:'🎾',pallavolo:'🏐',beach:'🏖️'}[s]||'🏆';}
function sportLabel(s){return{padel:'Padel',calcetto:'Calcetto',tennis:'Tennis',pallavolo:'Pallavolo',beach:'Beach Volley'}[s]||s;}

async function loadTornei(){
  try{
    const snap=await db.collection('tornei').orderBy('data','asc').get();
    allTornei=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    renderTorneiGrid();
  }catch(e){document.getElementById('tornei-grid').innerHTML='<div class="empty-state"><span class="emoji">❌</span><h3>Errore: '+e.message+'</h3></div>';}
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-tab').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  renderTorneiGrid();
}

function renderTorneiGrid(){
  const grid=document.getElementById('tornei-grid');
  let list=allTornei;
  if(currentFilter!=='all')list=list.filter(function(t){return t.status===currentFilter;});
  // Show live badge if any ongoing
  var liveBadge=document.getElementById('live-badge');
  if(liveBadge)liveBadge.style.display=allTornei.some(function(t){return t.status==='ongoing';})?'inline-flex':'none';
  if(!list.length){grid.innerHTML='<div class="empty-state"><span class="emoji">🏆</span><h3>Nessun torneo</h3><p>Torna presto per i prossimi tornei!</p></div>';return;}
  grid.innerHTML=list.map(function(t){
    const cnt=(t.iscritti||[]).length,max=t.maxPartecipanti||16,pct=Math.round(cnt/max*100);
    const ds=new Date(t.data+'T12:00:00').toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'});
    const modalita=t.modalita==='gironi'?'🔄 Gironi + Finale':'⚡ Eliminazione Diretta';
    var sb='';
    if(t.status==='open')sb='<span class="status-badge status-open">Iscrizioni aperte</span>';
    else if(t.status==='ongoing')sb='<span class="status-badge status-ongoing">🔴 In corso</span>';
    else if(t.status==='finished')sb='<span class="status-badge status-finished">✅ Concluso</span>';
    else sb='<span class="status-badge status-closed">Chiuse</span>';
    return '<div class="torneo-card" onclick="openTorneo(\''+t.id+'\')">'+
      '<div class="torneo-card-header"><span class="torneo-sport-icon">'+sportEmoji(t.sport)+'</span>'+
      '<div class="torneo-card-name">'+t.nome+'</div>'+
      '<div class="torneo-card-desc">'+ds+(t.desc?' · '+t.desc:'')+'</div></div>'+
      '<div class="torneo-card-body">'+
      '<div class="torneo-stats-row">'+
      '<div class="torneo-stat"><div class="torneo-stat-val">'+cnt+'</div><div class="torneo-stat-lbl">Iscritti</div></div>'+
      '<div class="torneo-stat"><div class="torneo-stat-val">'+max+'</div><div class="torneo-stat-lbl">Max</div></div>'+
      '<div class="torneo-stat"><div class="torneo-stat-val">'+pct+'%</div><div class="torneo-stat-lbl">Pieno</div></div>'+
      '</div>'+
      '<div class="torneo-progress-bar"><div class="torneo-progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div style="font-size:12px;color:var(--grigio2);">'+modalita+' · '+sportLabel(t.sport)+'</div>'+
      '</div>'+
      '<div class="torneo-card-footer">'+sb+
      '<button class="btn-vai" onclick="event.stopPropagation();openTorneo(\''+t.id+'\')">Apri →</button>'+
      '</div></div>';
  }).join('');
}

function openTorneo(tid){
  const t=allTornei.find(function(x){return x.id===tid;});
  if(!t)return;
  currentTorneo=t;
  window.history.pushState({},'','?id='+tid);
  renderDetail(t);
  document.getElementById('list-page').style.display='none';
  document.getElementById('detail-page').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
function openTorneoById(tid){const t=allTornei.find(function(x){return x.id===tid;});if(t)openTorneo(tid);}
function showList(){document.getElementById('detail-page').style.display='none';document.getElementById('list-page').style.display='block';window.history.pushState({},'',window.location.pathname);currentTorneo=null;}

async function renderDetail(t){
  const cnt=(t.iscritti||[]).length,max=t.maxPartecipanti||16;
  const ds=new Date(t.data+'T12:00:00').toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const modalita=t.modalita==='gironi'?'🔄 Gironi + Finale':'⚡ Eliminazione Diretta';
  const isc=currentUser&&(t.iscritti||[]).includes(currentUser.uid);
  const full=cnt>=max;
  var sb='';
  if(t.status==='open')sb='<span class="status-badge status-open" style="font-size:13px;">Iscrizioni aperte</span>';
  else if(t.status==='ongoing')sb='<span class="status-badge status-ongoing" style="font-size:13px;">🔴 In corso</span>';
  else if(t.status==='finished')sb='<span class="status-badge status-finished" style="font-size:13px;">✅ Concluso</span>';
  var iscBtn='';
  if(!currentUser)iscBtn='<a href="index.html" class="btn-iscriviti">Accedi per iscriverti</a>';
  else if(isc)iscBtn='<span class="btn-iscritto">✓ Sei iscritto</span>';
  else if(t.status==='open'&&!full)iscBtn='<button class="btn-iscriviti" onclick="iscriviTorneo(\''+t.id+'\')">Iscriviti al torneo</button>';
  else iscBtn='<button class="btn-iscriviti" disabled>Iscrizioni chiuse</button>';
  document.getElementById('detail-hero').innerHTML=
    '<div class="detail-hero-sport">'+sportEmoji(t.sport)+'</div>'+
    '<div class="detail-hero-name">'+t.nome+'</div>'+
    '<div class="detail-hero-meta">'+ds+' · '+sportLabel(t.sport)+' · '+modalita+'</div>'+
    '<div class="detail-hero-stats">'+
    '<div class="detail-stat"><div class="detail-stat-val">'+cnt+'</div><div class="detail-stat-lbl">Iscritti</div></div>'+
    '<div class="detail-stat"><div class="detail-stat-val">'+max+'</div><div class="detail-stat-lbl">Max</div></div>'+
    '<div class="detail-stat"><div class="detail-stat-val">'+(t.matches||[]).length+'</div><div class="detail-stat-lbl">Partite</div></div>'+
    '</div>'+
    '<div style="display:flex;align-items:center;gap:1rem;margin-top:1.5rem;flex-wrap:wrap;">'+sb+iscBtn+'</div>';
  if(currentUser&&currentUser.isAdmin)renderAdminPanel(t);
  else document.getElementById('admin-actions').style.display='none';
  const names=await loadIscrittiNames(t);
  renderTabIscritti(t,names);renderTabTabellone(t,names);renderTabPartite(t,names);
  showTab('iscritti',document.querySelector('.detail-tab'));
}

async function loadIscrittiNames(t){
  const uids=t.iscritti||[];
  if(!uids.length)return{};
  try{
    const snaps=await Promise.all(uids.map(function(uid){return db.collection('users').doc(uid).get();}));
    var map={};
    snaps.forEach(function(s){if(s.exists)map[s.id]=s.data().name||s.id;});
    return map;
  }catch(e){return{};}
}

function renderTabIscritti(t,names){
  const uids=t.iscritti||[];
  const el=document.getElementById('tab-iscritti');
  if(!uids.length){el.innerHTML='<div class="empty-state"><span class="emoji">👥</span><h3>Nessun iscritto ancora</h3><p>Sii il primo!</p></div>';return;}
  const colors=['#1a6b2a','#228b22','#2d9e4e','#0d3320','#1a4a25','#156020','#0e4a1a'];
  el.innerHTML='<div class="iscritti-grid">'+
    uids.map(function(uid,i){
      const nm=names[uid]||uid;
      return '<div class="iscritto-card">'+
        '<div class="iscritto-avatar" style="background:'+colors[i%colors.length]+'">'+nm[0].toUpperCase()+'</div>'+
        '<div><div class="iscritto-name">'+nm+'</div><div style="font-size:12px;color:var(--grigio2);">Iscritto ✓</div></div>'+
        '</div>';
    }).join('')+'</div>';
}

function renderTabTabellone(t,names){
  const el=document.getElementById('tab-tabellone');
  if(t.status==='open'||t.status==='closed'){
    el.innerHTML='<div class="empty-state"><span class="emoji">⏳</span><h3>Tabellone non ancora generato</h3><p>Sarà disponibile all\'avvio del torneo.</p></div>';return;
  }
  var podioHTML='';
  if(t.status==='finished'&&t.podio){
    const p=t.podio;
    podioHTML='<div class="podio">'+
      (p[1]?'<div class="podio-step"><div class="podio-medal">🥈</div><div class="podio-avatar silver">'+((names[p[1]]||p[1])[0]||'?').toUpperCase()+'</div><div class="podio-name">'+((names[p[1]]||p[1]).split(' ')[0])+'</div><div class="podio-bar silver"></div></div>':'')+
      (p[0]?'<div class="podio-step"><div class="podio-medal">🥇</div><div class="podio-avatar gold">'+((names[p[0]]||p[0])[0]||'?').toUpperCase()+'</div><div class="podio-name">'+((names[p[0]]||p[0]).split(' ')[0])+'</div><div class="podio-bar gold"></div></div>':'')+
      (p[2]?'<div class="podio-step"><div class="podio-medal">🥉</div><div class="podio-avatar bronze">'+((names[p[2]]||p[2])[0]||'?').toUpperCase()+'</div><div class="podio-name">'+((names[p[2]]||p[2]).split(' ')[0])+'</div><div class="podio-bar bronze"></div></div>':'')+
      '</div>';
  }
  if(t.modalita==='gironi')renderBracketGironi(t,names,el,podioHTML);
  else renderBracketElim(t,names,el,podioHTML);
}

function renderBracketElim(t,names,el,podioHTML){
  const matches=t.matches||[];
  if(!matches.length){el.innerHTML='<div class="empty-state"><span class="emoji">🏆</span><h3>Nessuna partita ancora</h3><p>Il tabellone sarà generato automaticamente all'avvio del torneo.</p></div>';return;}

  // Find winner
  var torneoWinner=null;
  const finale=matches.find(function(m){return m.round==='Finale'&&m.score1!=null&&m.score2!=null;});
  if(finale)torneoWinner=finale.score1>finale.score2?finale.p1:finale.p2;

  // Group rounds
  var rounds={};
  matches.forEach(function(m){if(!rounds[m.round])rounds[m.round]=[];rounds[m.round].push(m);});
  const ro=['Primo Turno','Sedicesimi','Ottavi di Finale','Quarti di Finale','Semifinale','Finale'];
  const sr=Object.keys(rounds).sort(function(a,b){var ia=ro.indexOf(a),ib=ro.indexOf(b);if(ia<0)ia=99;if(ib<0)ib=99;return ia-ib;});

  // Winner cinematic banner
  var winnerHTML='';
  if(torneoWinner){
    const wname=names[torneoWinner]||torneoWinner;
    var rays='',confetti='';
    const raysCount=12;
    const confColors=['#f59e0b','#ef4444','#3b82f6','#8b5cf6','#ec4899','#4ade80','#f97316'];
    for(var ri=0;ri<raysCount;ri++){
      const angle=(ri/raysCount)*360;
      const len=150+Math.random()*100;
      rays+='<div class="winner-ray" style="height:'+len+'px;transform:rotate('+angle+'deg) translateY(-'+len+'px);animation-delay:'+(ri*0.5)+'s;"></div>';
    }
    for(var ci=0;ci<20;ci++){
      const x=Math.random()*100,delay=Math.random()*3,col=confColors[ci%confColors.length];
      const shape=ci%3===0?'border-radius:2px':'border-radius:50%';
      confetti+='<div class="winner-confetti-piece" style="left:'+x+'%;background:'+col+';animation-delay:'+delay+'s;animation-duration:'+(2+Math.random()*2)+'s;'+shape+'"></div>';
    }
    winnerHTML='<div class="winner-cinema">'+
      '<div class="winner-rays">'+rays+'</div>'+
      confetti+
      '<div class="winner-trophy-big">🏆</div>'+
      '<div class="winner-tag">Campione del Torneo</div>'+
      '<div class="winner-nome">'+wname+'</div>'+
      '</div>';
  }

  // Build cinematic bracket
  var html='<div class="bracket-scene">'+
    winnerHTML+
    '<div class="bracket-scroll"><div class="bracket-stage" id="bracket-stage-'+t.id+'">';

  sr.forEach(function(round,ri){
    const isFinal=round==='Finale';
    html+='<div class="b-round" data-round="'+round+'">'+
      '<div class="b-round-title">'+round+'</div>'+
      '<div class="b-round-matches">';
    rounds[round].forEach(function(m,mi){
      const hs=m.score1!=null&&m.score2!=null;
      const w1=hs&&m.score1>m.score2,w2=hs&&m.score2>m.score1;
      const p1n=m.p1?(names[m.p1]||m.p1):null;
      const p2n=m.p2?(names[m.p2]||m.p2):null;
      const delay=(ri*0.12+mi*0.08);

      html+='<div class="b-match'+(hs?' done':'')+(isFinal?' final-match':'')+'" style="animation-delay:'+delay+'s" data-mid="'+m.id+'">';

      // Player 1
      var p1cls='b-player'+(w1?' winner':hs?' loser':'')+((!m.p1)?' tbd':'');
      html+='<div class="'+p1cls+'">'+
        '<div class="b-avatar">'+(p1n?p1n[0].toUpperCase():'?')+'</div>'+
        '<div class="b-name">'+(p1n||'<em>In attesa</em>')+'</div>';
      if(hs||m.score1!=null)html+='<div class="b-score">'+(m.score1!=null?m.score1:'–')+'</div>';
      html+='</div>';

      // Player 2
      var p2cls='b-player'+(w2?' winner':hs?' loser':'')+((!m.p2)?' tbd':'');
      html+='<div class="'+p2cls+'">'+
        '<div class="b-avatar">'+(p2n?p2n[0].toUpperCase():'?')+'</div>'+
        '<div class="b-name">'+(p2n||'<em>In attesa</em>')+'</div>';
      if(hs||m.score2!=null)html+='<div class="b-score">'+(m.score2!=null?m.score2:'–')+'</div>';
      html+='</div>';

      html+='</div>'; // b-match
    });
    html+='</div></div>'; // b-round-matches b-round
  });

  html+='</div></div></div>'; // bracket-stage bracket-scroll bracket-scene
  el.innerHTML=html;

  // Draw animated SVG connector lines
  setTimeout(function(){ drawCinematicLines('bracket-stage-'+t.id); }, 100);
}

function drawCinematicLines(stageId){
  const stage=document.getElementById(stageId);
  if(!stage)return;
  const rect=stage.getBoundingClientRect();
  const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.classList.add('bracket-lines-svg');
  svg.style.cssText='position:absolute;top:0;left:0;width:'+stage.scrollWidth+'px;height:'+stage.scrollHeight+'px;pointer-events:none;overflow:visible;';

  const rounds=stage.querySelectorAll('.b-round');
  rounds.forEach(function(roundEl,ri){
    if(ri>=rounds.length-1)return;
    const ms=roundEl.querySelectorAll('.b-match');
    const nextRound=rounds[ri+1];
    const nextMs=nextRound?nextRound.querySelectorAll('.b-match'):[];
    const stageRect=stage.getBoundingClientRect();
    for(var i=0;i<ms.length;i+=2){
      const m1=ms[i],m2=ms[i+1]||ms[i];
      const nm=nextMs[Math.floor(i/2)];
      if(!nm)continue;
      const r1=m1.getBoundingClientRect();
      const r2=m2.getBoundingClientRect();
      const rn=nm.getBoundingClientRect();
      // Use scrollLeft offset
      const ox=stage.scrollLeft;
      const x1=r1.right-stageRect.left+ox;
      const y1=r1.top+r1.height/2-stageRect.top+stage.scrollTop;
      const y2=r2.top+r2.height/2-stageRect.top+stage.scrollTop;
      const xn=rn.left-stageRect.left+ox;
      const yn=rn.top+rn.height/2-stageRect.top+stage.scrollTop;
      const mx=(x1+xn)/2;

      // Bezier path
      const path=document.createElementNS('http://www.w3.org/2000/svg','path');
      const d='M '+x1+' '+y1+' L '+mx+' '+y1+' L '+mx+' '+y2+' L '+mx+' '+yn+' L '+xn+' '+yn;
      path.setAttribute('d',d);
      path.setAttribute('fill','none');
      path.setAttribute('stroke','rgba(74,222,128,0.2)');
      path.setAttribute('stroke-width','1.5');
      path.setAttribute('stroke-linecap','round');
      path.setAttribute('stroke-linejoin','round');
      const len=path.getTotalLength?path.getTotalLength():300;
      path.style.strokeDasharray=len;
      path.style.strokeDashoffset=len;
      path.style.transition='stroke-dashoffset 0.7s ease '+(ri*0.25+0.1)+'s';
      svg.appendChild(path);
      requestAnimationFrame(function(p){setTimeout(function(){p.style.strokeDashoffset='0';},50);}.bind(null,path));
    }
  });
  stage.style.position='relative';
  stage.appendChild(svg);
}

  if(!Object.keys(gironi).length){el.innerHTML=podioHTML+'<div class="empty-state"><span class="emoji">🔄</span><h3>Gironi non ancora generati</h3></div>';return;}
  var html=podioHTML+'<div class="gironi-container">';
  Object.keys(gironi).forEach(function(gKey){
    const g=gironi[gKey],cls=g.classifica||[];
    html+='<div class="girone-card"><div class="girone-header">'+gKey+'</div>'+
      '<table class="girone-table"><thead><tr><th>Giocatore</th><th>V</th><th>P</th><th>Pt</th></tr></thead><tbody>'+

        (hs?'<div class="match-score-display">'+m.score1+' – '+m.score2+'</div>':'<div style="color:var(--grigio2);font-size:13px;font-style:italic;">Da giocare</div>');

function showTab(tab,btn){
  ['iscritti','tabellone','partite'].forEach(function(t){document.getElementById('tab-'+t).style.display=t===tab?'block':'none';});
  document.querySelectorAll('.detail-tab').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
}

async function iscriviTorneo(tid){
  if(!currentUser){window.location.href='index.html';return;}
  showLoading();
  try{
    const t=allTornei.find(function(x){return x.id===tid;});
    const newI=(t.iscritti||[]).concat([currentUser.uid]);
    await db.collection('tornei').doc(tid).update({iscritti:newI});
    t.iscritti=newI;
    if(newI.length>=t.maxPartecipanti){await db.collection('tornei').doc(tid).update({status:'closed'});t.status='closed';}
    hideLoading();showToast('✅ Iscrizione confermata!');
    await renderDetail(t);renderTorneiGrid();
  }catch(e){hideLoading();showToast('Errore: '+e.message,true);}
}

async function saveScore(tid,mid){
  const t=allTornei.find(function(x){return x.id===tid;});if(!t)return;
  const m=(t.matches||[]).find(function(x){return x.id===mid;});if(!m)return;
  const s1=parseInt(document.getElementById('s1-'+mid).value),s2=parseInt(document.getElementById('s2-'+mid).value);
  if(isNaN(s1)||isNaN(s2)){showToast('Inserisci entrambi i punteggi',true);return;}
  showLoading();
  try{
    m.score1=s1;m.score2=s2;
    await db.collection('tornei').doc(tid).update({matches:t.matches});
    // Aggiorna in base alla modalità
    if(m.fase==='girone'||t.modalita==='round_robin'){
      await aggiornaClassificaGironi(t,m);
      // Controlla se tutti i gironi sono finiti → genera finali
      await aggiornaFinaliRoundRobin(t);
    } else if(m.fase==='elim'){
      await avanzaEliminazioneDiretta(t,mid);
    }
    hideLoading();showToast('✅ Risultato salvato!');
    const names=await loadIscrittiNames(t);
    renderTabPartite(t,names);renderTabTabellone(t,names);
  }catch(e){hideLoading();showToast('Errore: '+e.message,true);}
}

async function aggiornaClassificaGironi(t,m){
  const gironi=t.gironi||{};
  Object.keys(gironi).forEach(function(gKey){
    const g=gironi[gKey];
    if(!(g.players||[]).includes(m.p1)||(!(g.players||[]).includes(m.p2)))return;
    var cls={};
    (g.players||[]).forEach(function(p){cls[p]={uid:p,vinte:0,perse:0,punti:0};});
    (t.matches||[]).forEach(function(mx){
      if(!(g.players||[]).includes(mx.p1)||mx.score1==null)return;
      if(mx.score1>mx.score2){cls[mx.p1].vinte++;cls[mx.p1].punti+=3;cls[mx.p2].perse++;}
      else if(mx.score2>mx.score1){cls[mx.p2].vinte++;cls[mx.p2].punti+=3;cls[mx.p1].perse++;}
    });
    gironi[gKey].classifica=Object.values(cls).sort(function(a,b){return b.punti-a.punti;});
  });
  t.gironi=gironi;
  await db.collection('tornei').doc(t.id).update({gironi:gironi});
}

function renderAdminPanel(t){
  const el=document.getElementById('admin-actions');el.style.display='block';
  var html='<div class="admin-panel"><div class="admin-title">⚙️ Pannello Admin — '+t.nome+'</div>';
  html+='<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:1.25rem;">';
  if(t.status==='open'||t.status==='closed')html+='<button class="btn-main" onclick="avviaTorneo(\''+t.id+'\')">🚀 Avvia Torneo e genera tabellone</button>';

  html+='<button class="btn-danger" onclick="deleteTorneo(\''+t.id+'\')">🗑️ Elimina torneo</button></div>';
  html+='<div style="display:flex;align-items:center;gap:10px;font-size:14px;"><span style="color:var(--grigio2);font-weight:600;">Cambia stato:</span><select class="form-select" style="max-width:220px;" onchange="cambiaStatus(\''+t.id+'\',this.value)"><option value="open"'+(t.status==='open'?' selected':'')+'>🟢 Iscrizioni aperte</option><option value="closed"'+(t.status==='closed'?' selected':'')+'>🔒 Iscrizioni chiuse</option><option value="ongoing"'+(t.status==='ongoing'?' selected':'')+'>🔴 In corso</option><option value="finished"'+(t.status==='finished'?' selected':'')+'>✅ Concluso</option></select></div></div>';
  el.innerHTML=html;

async function cambiaStatus(tid,newStatus){
  showLoading();
  try{
    await db.collection('tornei').doc(tid).update({status:newStatus});
    const t=allTornei.find(function(x){return x.id===tid;});
    if(t)t.status=newStatus;
    hideLoading();showToast('Stato aggiornato!');
    await renderDetail(t||currentTorneo);renderTorneiGrid();
  }catch(e){hideLoading();showToast('Errore: '+e.message,true);}
}

async function avviaTorneo(tid){
  const t=allTornei.find(function(x){return x.id===tid;});if(!t)return;
  const cnt=(t.iscritti||[]).length;
  if(cnt<4){showToast('Servono almeno 4 iscritti!',true);return;}
  showLoading();
  try{
    var matches=[],gironi={};
    const players=shuffle(t.iscritti||[]);

    if(t.modalita==='round_robin'){
      // ROUND ROBIN: gironi tutti contro tutti (1 set) + finale a eliminazione
      const nG=cnt<=8?2:cnt<=12?3:cnt<=16?4:Math.ceil(cnt/4);
      const gSize=Math.ceil(cnt/nG);
      for(var g=0;g<nG;g++){
        const gP=players.slice(g*gSize,(g+1)*gSize);
        const gKey='Girone '+'ABCDEFGH'[g];
        var cls={};gP.forEach(function(p){cls[p]={uid:p,vinte:0,perse:0,punti:0};});
        gironi[gKey]={players:gP,classifica:Object.values(cls)};
        for(var i=0;i<gP.length;i++)
          for(var j=i+1;j<gP.length;j++)
            matches.push({id:'g'+g+'i'+i+'j'+j+'_'+Date.now().toString(36),
              p1:gP[i],p2:gP[j],round:gKey,fase:'girone',score1:null,score2:null,format:'1set'});
      }
      // Slot finali (TBD — si riempiono quando i gironi finiscono)
      const nQ=Math.floor(nG/2);
      for(var f=0;f<nQ;f++)
        matches.push({id:'sf'+f+'_'+Date.now().toString(36),
          p1:null,p2:null,round:nQ===1?'Finale':'Semifinale',fase:'finale',score1:null,score2:null,format:'2set'});
      if(nQ>1)
        matches.push({id:'fin_'+Date.now().toString(36),
          p1:null,p2:null,round:'Finale',fase:'finale',score1:null,score2:null,format:'2set'});
    } else {
      // ELIMINAZIONE DIRETTA: sorteggio casuale, partite al meglio di 2 set
      var roundPlayers=players.slice();
      while(roundPlayers.length>1){
        const rName=getRoundName(roundPlayers.length);
        var next=[];
        for(var i=0;i<roundPlayers.length;i+=2){
          matches.push({id:'r'+i+'_'+Date.now().toString(36)+Math.random().toString(36).substr(2,3),
            p1:roundPlayers[i],p2:roundPlayers[i+1]||null,
            round:rName,fase:'elim',score1:null,score2:null,format:'2set',slot:Math.floor(i/2)});
          next.push(null);
        }
        roundPlayers=next;
        if(roundPlayers.length<=1)break;
      }
    }

    await db.collection('tornei').doc(tid).update({status:'ongoing',matches:matches,gironi:gironi});
    t.status='ongoing';t.matches=matches;t.gironi=gironi;
    hideLoading();showToast('🚀 Torneo avviato! Tabellone generato automaticamente.');
    await renderDetail(t);renderTorneiGrid();
  }catch(e){hideLoading();showToast('Errore: '+e.message,true);}
}

async function concludiTorneo(tid){
  if(!confirm('Concludere il torneo?'))return;
  showLoading();
  try{
    await db.collection('tornei').doc(tid).update({status:'finished'});
    const t=allTornei.find(function(x){return x.id===tid;});if(t)t.status='finished';
    hideLoading();showToast('🏆 Torneo concluso!');
    await renderDetail(t||currentTorneo);renderTorneiGrid();
  }catch(e){hideLoading();showToast('Errore: '+e.message,true);}
}

async function deleteTorneo(tid){
  if(!confirm('Eliminare definitivamente questo torneo?'))return;
  showLoading();
  try{
    await db.collection('tornei').doc(tid).delete();
    allTornei=allTornei.filter(function(t){return t.id!==tid;});
    hideLoading();showToast('Torneo eliminato');showList();renderTorneiGrid();
  }catch(e){hideLoading();showToast('Errore: '+e.message,true);}
}

function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}
function getRoundName(n){if(n<=2)return 'Finale';if(n<=4)return 'Semifinale';if(n<=8)return 'Quarti di Finale';if(n<=16)return 'Ottavi di Finale';if(n<=32)return 'Sedicesimi';return 'Primo Turno';}

async function aggiornaFinaliRoundRobin(t){
  // Quando tutti i gironi sono completati, popola le semifinali con i primi classificati
  const gironi=t.gironi||{};
  const gKeys=Object.keys(gironi);
  const matches=t.matches||[];
  var allDone=true;
  gKeys.forEach(function(gKey){
    const gm=matches.filter(function(m){return m.round===gKey&&m.fase==='girone';});
    if(!gm.every(function(m){return m.score1!=null&&m.score2!=null;}))allDone=false;
  });
  if(!allDone)return false;
  // Prendi il primo classificato per girone
  var qualificati=[];
  gKeys.forEach(function(gKey){
    const cls=gironi[gKey].classifica||[];
    if(cls.length>0)qualificati.push(cls[0].uid);
  });
  qualificati=shuffle(qualificati);
  // Popola le semifinali
  const semi=matches.filter(function(m){return m.fase==='finale'&&m.round!=='Finale';});
  semi.forEach(function(m,i){m.p1=qualificati[i*2]||null;m.p2=qualificati[i*2+1]||null;});
  await db.collection('tornei').doc(t.id).update({matches:matches});
  t.matches=matches;
  showToast('🏆 Gironi completati! Semifinali generate automaticamente.');
  return true;
}

async function avanzaEliminazioneDiretta(t,matchId){
  // Dopo ogni risultato in elim diretta, propaga il vincitore al turno successivo
  const matches=t.matches||[];
  const m=matches.find(function(x){return x.id===matchId;});
  if(!m||m.score1==null||m.score2==null)return;
  const winner=m.score1>m.score2?m.p1:m.p2;
  const roundOrder=['Primo Turno','Sedicesimi','Ottavi di Finale','Quarti di Finale','Semifinale','Finale'];
  const currIdx=roundOrder.indexOf(m.round);
  if(currIdx<0||currIdx>=roundOrder.length-1)return;
  const nextRound=roundOrder[currIdx+1];
  // Trova i match del round corrente per calcolare la posizione
  const currRoundMatches=matches.filter(function(x){return x.round===m.round&&x.fase==='elim';});
  const posInRound=currRoundMatches.findIndex(function(x){return x.id===matchId;});
  const nextSlot=Math.floor(posInRound/2);
  const nextMatches=matches.filter(function(x){return x.round===nextRound&&x.fase==='elim';});
  if(nextMatches[nextSlot]){
    if(posInRound%2===0)nextMatches[nextSlot].p1=winner;
    else nextMatches[nextSlot].p2=winner;
    await db.collection('tornei').doc(t.id).update({matches:matches});
    t.matches=matches;
  }
}
