<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tornei — Play Padel Biccari</title>
<meta name="theme-color" content="#0F5132">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --verde:#1a6b2a;--verde2:#228b22;--verde3:#2d9e4e;--verde-light:#e8f5e9;
  --oro:#b8860b;--oro2:#d4a017;--bianco:#1c2b1e;--grigio2:#6b7e6d;
  --card-bg:#ffffff;--surface:#f0ece4;--border:rgba(28,43,30,0.10);
  --danger:#c0392b;--radius:14px;--radius-lg:22px;--bg-page:#f4f1eb;
  --shadow:0 4px 24px rgba(28,43,30,0.09);
  --shadow-lg:0 12px 48px rgba(28,43,30,0.16);
  --shadow-xl:0 24px 80px rgba(28,43,30,0.20);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg-page);color:var(--bianco);min-height:100vh;}

/* ── TOPBAR ── */
#topbar{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:rgba(244,241,235,0.9);backdrop-filter:blur(28px) saturate(1.8);border-bottom:1px solid rgba(28,43,30,0.08);box-shadow:0 4px 20px rgba(28,43,30,0.05);}
.topbar-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.topbar-logo img{width:32px;height:32px;border-radius:6px;}
.topbar-logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--verde);letter-spacing:1px;}
.back-btn{display:flex;align-items:center;gap:8px;background:none;border:1.5px solid var(--border);color:var(--bianco);padding:8px 16px;border-radius:50px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;text-decoration:none;}
.back-btn:hover{background:var(--verde-light);border-color:var(--verde);color:var(--verde);}
#user-chip{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:50px;padding:5px 14px 5px 5px;font-size:14px;font-weight:500;}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--verde),var(--verde2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;}
main{padding-top:64px;}

/* ── HERO CINEMATICO ── */
.tornei-hero{
  position:relative;overflow:hidden;
  background:#050d05;
  padding:5rem 2rem 4rem;text-align:center;
  min-height:360px;display:flex;flex-direction:column;align-items:center;justify-content:center;
}
.hero-bg-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:900px;height:900px;background:radial-gradient(circle,rgba(26,107,42,0.20) 0%,transparent 65%);pointer-events:none;animation:glowBreath 5s ease-in-out infinite;}
@keyframes glowBreath{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.8;}50%{transform:translate(-50%,-50%) scale(1.2);opacity:1;}}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(74,222,128,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(74,222,128,0.04) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;}
.hero-scan-line{position:absolute;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(74,222,128,0.6) 50%,transparent 100%);animation:scanDown 4s linear infinite;pointer-events:none;}
@keyframes scanDown{0%{top:-1px;opacity:0;}5%{opacity:1;}95%{opacity:1;}100%{top:100%;opacity:0;}}
.hero-particles{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.hero-particle{position:absolute;border-radius:50%;animation:floatUp linear infinite;opacity:0;}
@keyframes floatUp{0%{transform:translateY(100%) scale(0);opacity:0;}10%{opacity:0.8;}85%{opacity:0.4;}100%{transform:translateY(-100%) scale(1.5);opacity:0;}}
.hero-eyebrow{position:relative;font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(74,222,128,0.7);margin-bottom:1rem;display:flex;align-items:center;justify-content:center;gap:14px;}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';width:50px;height:1px;background:linear-gradient(90deg,transparent,rgba(74,222,128,0.5));}
.hero-eyebrow::after{background:linear-gradient(270deg,transparent,rgba(74,222,128,0.5));}
.hero-title{position:relative;font-family:'Bebas Neue',sans-serif;font-size:clamp(72px,12vw,150px);color:white;letter-spacing:6px;line-height:0.85;text-shadow:0 0 60px rgba(74,222,128,0.15);}
.hero-title .accent{color:#4ade80;text-shadow:0 0 40px rgba(74,222,128,0.5);}
.hero-sub{position:relative;font-size:15px;color:rgba(255,255,255,0.45);margin-top:1.2rem;letter-spacing:2px;text-transform:uppercase;}
.hero-stats-bar{position:relative;display:flex;gap:2rem;margin-top:2rem;justify-content:center;flex-wrap:wrap;}
.hero-stat-item{text-align:center;}
.hero-stat-num{font-family:'Bebas Neue',sans-serif;font-size:36px;color:#4ade80;line-height:1;}
.hero-stat-lbl{font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:2px;text-transform:uppercase;margin-top:2px;}
.hero-live-pill{display:none;align-items:center;gap:8px;background:rgba(230,57,70,0.12);border:1px solid rgba(230,57,70,0.35);color:#ff6b6b;padding:7px 16px;border-radius:50px;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:1.5rem;position:relative;}
.hero-live-dot{width:7px;height:7px;border-radius:50%;background:#ff6b6b;animation:livePulse 1.2s ease-in-out infinite;}
@keyframes livePulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,107,0.5);}50%{box-shadow:0 0 0 6px transparent;}}

/* ── FILTER BAR ── */
.filter-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:2rem 2rem 0;}
.filter-tab{background:var(--card-bg);border:1.5px solid var(--border);color:var(--grigio2);padding:9px 22px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.25s;position:relative;overflow:hidden;}
.filter-tab::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--verde),var(--verde2));opacity:0;transition:opacity 0.25s;}
.filter-tab:hover{border-color:var(--verde);color:var(--verde);transform:translateY(-2px);}
.filter-tab.active{border-color:transparent;color:white;box-shadow:0 4px 16px rgba(26,107,42,0.35);transform:translateY(-2px);}
.filter-tab.active::before{opacity:1;}
.filter-tab span{position:relative;}

/* ── TORNEI GRID ── */
.tornei-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.5rem;padding:2rem;max-width:1200px;margin:0 auto;}

/* ── TORNEO CARD PREMIUM ── */
.torneo-card{
  background:var(--card-bg);border:1.5px solid var(--border);
  border-radius:var(--radius-lg);overflow:hidden;
  box-shadow:var(--shadow);cursor:pointer;position:relative;
  animation:cardReveal 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.35s,border-color 0.35s;
}
@keyframes cardReveal{from{opacity:0;transform:translateY(30px) scale(0.92);}to{opacity:1;transform:translateY(0) scale(1);}}
.torneo-card:hover{transform:translateY(-10px) scale(1.02);box-shadow:var(--shadow-xl);border-color:rgba(26,107,42,0.4);}
.torneo-card-header{
  padding:1.75rem 1.5rem 1.25rem;
  background:linear-gradient(135deg,#060e06 0%,#0d1f0d 50%,#1a3a1a 100%);
  position:relative;overflow:hidden;
}
.torneo-card-header::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;background:radial-gradient(circle,rgba(74,222,128,0.1) 0%,transparent 70%);}
.torneo-card-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(74,222,128,0.3),transparent);}
.torneo-sport-icon{font-size:40px;margin-bottom:0.75rem;display:block;filter:drop-shadow(0 0 12px rgba(74,222,128,0.3));transition:transform 0.3s;}
.torneo-card:hover .torneo-sport-icon{transform:scale(1.15) rotate(-5deg);}
.torneo-card-name{font-size:21px;font-weight:800;color:white;margin-bottom:4px;letter-spacing:0.3px;}
.torneo-card-desc{font-size:12px;color:rgba(255,255,255,0.45);letter-spacing:0.5px;}
.torneo-card-body{padding:1.25rem 1.5rem;}
.torneo-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.torneo-stat{background:var(--surface);border-radius:10px;padding:10px 8px;text-align:center;transition:all 0.2s;}
.torneo-card:hover .torneo-stat{background:rgba(26,107,42,0.06);}
.torneo-stat-val{font-size:20px;font-weight:800;color:var(--verde);}
.torneo-stat-lbl{font-size:10px;color:var(--grigio2);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}
.torneo-progress-bar{background:var(--surface);border-radius:50px;height:5px;overflow:hidden;margin-bottom:1rem;}
.torneo-progress-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--verde),var(--verde3));transition:width 1s ease;}
.torneo-card-footer{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1.5rem 1.25rem;}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:50px;font-size:12px;font-weight:700;}
.status-open{background:rgba(26,107,42,0.1);color:var(--verde);}
.status-open::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--verde);display:inline-block;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.3;}}
.status-closed{background:rgba(184,134,11,0.1);color:var(--oro);}
.status-ongoing{background:rgba(230,57,70,0.1);color:#e63946;}
.status-ongoing::before{content:'';width:6px;height:6px;border-radius:50%;background:#e63946;display:inline-block;animation:blink 0.8s infinite;}
.status-finished{background:var(--surface);color:var(--grigio2);}
.btn-vai{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--verde),var(--verde2));color:white;border:none;padding:9px 20px;border-radius:50px;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.25s;box-shadow:0 4px 14px rgba(26,107,42,0.3);}
.btn-vai:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(26,107,42,0.45);}

/* ── DETAIL PAGE ── */
#detail-page{display:none;padding:2rem;max-width:1300px;margin:0 auto;}
.detail-hero{
  background:linear-gradient(135deg,#060e06,#0a1a0a,#0f2a14);
  border-radius:var(--radius-lg);padding:3rem;margin-bottom:2rem;
  position:relative;overflow:hidden;
  border:1px solid rgba(74,222,128,0.1);
}
.detail-hero::before{content:'';position:absolute;top:-80px;right:-80px;width:400px;height:400px;background:radial-gradient(circle,rgba(74,222,128,0.1) 0%,transparent 70%);pointer-events:none;}
.detail-hero-scan{position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(74,222,128,0.6),transparent);animation:scanDown 5s linear infinite;}
.detail-hero-sport{font-size:52px;margin-bottom:1rem;display:block;animation:sportFloat 3s ease-in-out infinite;filter:drop-shadow(0 0 20px rgba(74,222,128,0.3));}
@keyframes sportFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.detail-hero-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(40px,7vw,80px);color:white;letter-spacing:3px;text-shadow:0 0 40px rgba(74,222,128,0.15);}
.detail-hero-meta{font-size:14px;color:rgba(255,255,255,0.45);margin-top:0.5rem;letter-spacing:0.5px;}
.detail-hero-stats{display:flex;gap:1rem;margin-top:1.5rem;flex-wrap:wrap;}
.detail-stat{background:rgba(255,255,255,0.04);border:1px solid rgba(74,222,128,0.12);border-radius:14px;padding:14px 22px;text-align:center;min-width:80px;transition:all 0.3s;backdrop-filter:blur(10px);}
.detail-stat:hover{background:rgba(74,222,128,0.07);border-color:rgba(74,222,128,0.3);transform:translateY(-2px);}
.detail-stat-val{font-size:26px;font-weight:800;color:#4ade80;}
.detail-stat-lbl{font-size:10px;color:rgba(255,255,255,0.35);text-transform:uppercase;letter-spacing:1.5px;margin-top:3px;}
.detail-tabs{display:flex;gap:4px;background:var(--surface);border-radius:50px;padding:4px;margin-bottom:2rem;width:fit-content;overflow-x:auto;}
.detail-tab{padding:10px 26px;border-radius:50px;font-size:14px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--grigio2);transition:all 0.22s;white-space:nowrap;}
.detail-tab.active{background:linear-gradient(135deg,var(--verde),var(--verde2));color:white;box-shadow:0 4px 14px rgba(26,107,42,0.3);}

/* ── ISCRITTI ── */
.iscritti-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px;}
.iscritto-card{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);transition:all 0.25s;animation:cardReveal 0.4s ease both;}
.iscritto-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:rgba(26,107,42,0.3);}
.iscritto-avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--verde),var(--verde2));display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:white;flex-shrink:0;box-shadow:0 3px 10px rgba(26,107,42,0.3);}
.iscritto-name{font-size:14px;font-weight:600;}

/* ══════════════════════════════════════════
   BRACKET ESPN/WIMBLEDON STYLE — DARK THEME
══════════════════════════════════════════ */
.bracket-scene{
  background:linear-gradient(135deg,#060e06 0%,#080f08 50%,#060e06 100%);
  border-radius:var(--radius-lg);overflow:hidden;
  border:1px solid rgba(74,222,128,0.08);position:relative;
}
.bracket-scene-header{
  padding:1.25rem 2rem;
  border-bottom:1px solid rgba(74,222,128,0.08);
  display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
}
.bracket-scene-title{font-family:'Bebas Neue',sans-serif;font-size:22px;color:rgba(74,222,128,0.9);letter-spacing:3px;}
.bracket-scene-sub{font-size:12px;color:rgba(255,255,255,0.3);letter-spacing:1px;}
.bracket-scroll{overflow-x:auto;padding:2rem;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:rgba(74,222,128,0.2) transparent;}
.bracket-scroll::-webkit-scrollbar{height:4px;}
.bracket-scroll::-webkit-scrollbar-track{background:transparent;}
.bracket-scroll::-webkit-scrollbar-thumb{background:rgba(74,222,128,0.2);border-radius:2px;}
.bracket-stage{display:flex;align-items:stretch;position:relative;min-width:fit-content;}

/* Round column */
.b-round{display:flex;flex-direction:column;padding:0 16px;position:relative;}
.b-round-label{
  font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:3px;
  color:rgba(74,222,128,0.5);text-align:center;margin-bottom:1rem;
  padding-bottom:10px;border-bottom:1px solid rgba(74,222,128,0.1);
  white-space:nowrap;
}
.b-round-matches{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:0;}

/* Match card */
.b-match{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(74,222,128,0.12);
  border-radius:10px;overflow:hidden;
  margin:10px 0;width:200px;
  transition:all 0.3s cubic-bezier(0.34,1.56,0.64,1);
  position:relative;
  animation:matchReveal 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes matchReveal{from{opacity:0;transform:scale(0.7) translateX(-30px);}to{opacity:1;transform:scale(1) translateX(0);}}
.b-match:hover{border-color:rgba(74,222,128,0.35);transform:scale(1.05);box-shadow:0 0 24px rgba(74,222,128,0.08),0 4px 20px rgba(0,0,0,0.4);}
.b-match.done{border-color:rgba(74,222,128,0.25);background:rgba(26,107,42,0.06);}
.b-match.is-final{border-color:rgba(212,160,23,0.4);background:rgba(184,134,11,0.05);box-shadow:0 0 30px rgba(184,134,11,0.12);}
.b-match.is-final::before{content:'🏆';position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:22px;animation:trophyHover 2s ease-in-out infinite;}
@keyframes trophyHover{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-5px);}}

/* Player row inside match */
.b-player{display:flex;align-items:center;gap:9px;padding:10px 12px;transition:all 0.25s;position:relative;overflow:hidden;}
.b-player::after{content:'';position:absolute;left:-100%;top:0;bottom:0;width:100%;background:linear-gradient(90deg,rgba(74,222,128,0.1),transparent);transition:left 0.4s ease;}
.b-player.winner::after{left:0;}
.b-player+.b-player{border-top:1px solid rgba(255,255,255,0.05);}
.b-player.loser{opacity:0.3;}

.b-avatar{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.25);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:rgba(255,255,255,0.8);
  transition:all 0.3s;
}
.b-player.winner .b-avatar{background:linear-gradient(135deg,#d4a017,#b8860b);border-color:#d4a017;box-shadow:0 0 10px rgba(212,160,23,0.4);transform:scale(1.15);}
.b-player.tbd .b-avatar{background:rgba(255,255,255,0.04);border-color:rgba(255,255,255,0.08);}

.b-name{font-size:12px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:rgba(255,255,255,0.75);transition:color 0.3s;}
.b-player.winner .b-name{color:#4ade80;font-weight:800;}
.b-player.tbd .b-name{color:rgba(255,255,255,0.2);font-style:italic;font-weight:400;}

.b-score{
  font-family:'Bebas Neue',sans-serif;font-size:20px;font-weight:400;
  min-width:28px;text-align:center;
  color:rgba(255,255,255,0.2);
  transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  line-height:1;
}
.b-player.winner .b-score{
  color:#4ade80;
  text-shadow:0 0 12px rgba(74,222,128,0.6);
  animation:scorePop 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes scorePop{from{transform:scale(0) rotate(-15deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
.b-player.loser .b-score{color:rgba(255,255,255,0.12);}

/* SVG connector lines */
.bracket-svg{position:absolute;top:0;left:0;pointer-events:none;overflow:visible;}

/* ── WINNER BANNER ── */
.winner-banner{
  background:linear-gradient(135deg,#060e06,#0a1a0a);
  border-radius:var(--radius-lg);padding:4rem 2rem;text-align:center;
  margin-bottom:2rem;position:relative;overflow:hidden;
  border:1px solid rgba(212,160,23,0.2);
  animation:bannerIn 1s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes bannerIn{from{opacity:0;transform:scale(0.85);}to{opacity:1;transform:scale(1);}}
.winner-banner::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 50% 40%,rgba(212,160,23,0.08),transparent 60%);pointer-events:none;}
.winner-rays{position:absolute;inset:0;pointer-events:none;}
.winner-ray{position:absolute;top:50%;left:50%;width:1px;background:linear-gradient(to top,transparent,rgba(212,160,23,0.12),transparent);transform-origin:bottom center;animation:rayRotate 10s linear infinite;}
@keyframes rayRotate{from{transform:rotate(0deg) scaleY(3);}to{transform:rotate(360deg) scaleY(3);}}
.winner-trophy{font-size:72px;display:block;margin-bottom:0.5rem;animation:trophyIn 1s cubic-bezier(0.34,1.56,0.64,1) 0.2s both,trophyFloat 3s ease-in-out 1.2s infinite;}
@keyframes trophyIn{from{transform:scale(0) rotate(-20deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
@keyframes trophyFloat{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-10px) scale(1.05);}}
.winner-label{font-size:11px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:rgba(212,160,23,0.6);margin-bottom:0.5rem;}
.winner-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(48px,9vw,100px);color:white;letter-spacing:4px;text-shadow:0 0 60px rgba(212,160,23,0.35);animation:nameIn 0.8s ease 0.5s both;}
@keyframes nameIn{from{opacity:0;transform:translateY(20px);letter-spacing:20px;}to{opacity:1;transform:translateY(0);letter-spacing:4px;}}

<script>
const firebaseConfig={apiKey:"AIzaSyDedRUBLyAT6yRxQ4ZJWwwJIlVvFyLEW8Q",authDomain:"playpadel-biccari.firebaseapp.com",projectId:"playpadel-biccari",storageBucket:"playpadel-biccari.firebasestorage.app",messagingSenderId:"239722542498",appId:"1:239722542498:web:c085d112c3c560686c2efb"};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore(),auth=firebase.auth();
var currentUser=null,allTornei=[],currentTorneo=null,currentFilter='all';

auth.onAuthStateChanged(async function(u){
  if(u){
    try{
      const doc=await db.collection('users').doc(u.uid).get();
      const data=doc.exists?doc.data():{};
      currentUser=Object.assign({uid:u.uid,email:u.email},data);
      document.getElementById('user-chip').style.display='flex';
      document.getElementById('user-initial').textContent=(currentUser.name||'U')[0].toUpperCase();

  }else{
    currentUser=null;
    document.getElementById('user-chip').style.display='none';
  }
  const urlParams=new URLSearchParams(window.location.search);
  const tid=urlParams.get('id');
  await loadTornei();
  if(tid)openTorneoById(tid);
});

function showToast(msg,err){const t=document.getElementById('toast');t.textContent=msg;t.style.background=err?'#c0392b':'#1c2b1e';t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function showLoading(){document.getElementById('loading-overlay').style.display='flex';}
function hideLoading(){document.getElementById('loading-overlay').style.display='none';}
function sportEmoji(s){return{padel:'🏓',calcetto:'⚽',tennis:'🎾',pallavolo:'🏐',beach:'🏖️'}[s]||'🏆';}
function sportLabel(s){return{padel:'Padel',calcetto:'Calcetto',tennis:'Tennis',pallavolo:'Pallavolo',beach:'Beach Volley'}[s]||s;}

async function loadTornei(){
  try{
    const snap=await db.collection('tornei').orderBy('data','asc').get();
    allTornei=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
    renderTorneiGrid();
  }catch(e){document.getElementById('tornei-grid').innerHTML='<div class="empty-state"><span class="emoji">❌</span><h3>Errore: '+e.message+'</h3></div>';}
}

function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-tab').forEach(function(b){b.classList.remove('active');});
  if(btn)btn.classList.add('active');
  renderTorneiGrid();
}

function renderTorneiGrid(){
  updateHeroStats();
  const grid=document.getElementById('tornei-grid');
  let list=allTornei;
  if(currentFilter!=='all')list=list.filter(function(t){return t.status===currentFilter;});
  if(!list.length){grid.innerHTML='<div class="empty-state"><span class="emoji">🏆</span><h3>Nessun torneo</h3><p>Torna presto per i prossimi tornei!</p></div>';return;}
  grid.innerHTML=list.map(function(t){
    const cnt=(t.iscritti||[]).length,max=t.maxPartecipanti||16,pct=Math.round(cnt/max*100);
    const ds=new Date(t.data+'T12:00:00').toLocaleDateString('it-IT',{day:'numeric',month:'long',year:'numeric'});
    const modalita=t.modalita==='round_robin'?'🔄 Round Robin Doppio':'⚡ Eliminazione Diretta Doppio';
    var sb='';
    if(t.status==='open')sb='<span class="status-badge status-open">Iscrizioni aperte</span>';
    else if(t.status==='ongoing')sb='<span class="status-badge status-ongoing">🔴 In corso</span>';
    else if(t.status==='finished')sb='<span class="status-badge status-finished">✅ Concluso</span>';
    else sb='<span class="status-badge status-closed">Chiuse</span>';
    return '<div class="torneo-card" onclick="openTorneo(\''+t.id+'\')">'+
      '<div class="torneo-card-header"><span class="torneo-sport-icon">'+sportEmoji(t.sport)+'</span>'+
      '<div class="torneo-card-name">'+t.nome+'</div>'+
      '<div class="torneo-card-desc">'+ds+(t.desc?' · '+t.desc:'')+'</div></div>'+
      '<div class="torneo-card-body">'+
      '<div class="torneo-stats-row">'+
      '<div class="torneo-stat"><div class="torneo-stat-val">'+cnt+'</div><div class="torneo-stat-lbl">Iscritti</div></div>'+
      '<div class="torneo-stat"><div class="torneo-stat-val">'+max+'</div><div class="torneo-stat-lbl">Max</div></div>'+
      '<div class="torneo-stat"><div class="torneo-stat-val">'+pct+'%</div><div class="torneo-stat-lbl">Pieno</div></div>'+
      '</div>'+
      '<div class="torneo-progress-bar"><div class="torneo-progress-fill" style="width:'+pct+'%"></div></div>'+
      '<div style="font-size:12px;color:var(--grigio2);">'+modalita+' · '+sportLabel(t.sport)+'</div>'+
      '</div>'+
      '<div class="torneo-card-footer">'+sb+
      '<button class="btn-vai" onclick="event.stopPropagation();openTorneo(\''+t.id+'\')">Apri →</button>'+
      '</div></div>';
  }).join('');
}

function openTorneo(tid){
  const t=allTornei.find(function(x){return x.id===tid;});
  if(!t)return;
  currentTorneo=t;
  window.history.pushState({},'','?id='+tid);
  renderDetail(t);
  document.getElementById('list-page').style.display='none';
  document.getElementById('detail-page').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
}
function openTorneoById(tid){const t=allTornei.find(function(x){return x.id===tid;});if(t)openTorneo(tid);}
function showList(){document.getElementById('detail-page').style.display='none';document.getElementById('list-page').style.display='block';window.history.pushState({},'',window.location.pathname);currentTorneo=null;}

async function renderDetail(t){
  const cnt=(t.iscritti||[]).length,max=t.maxPartecipanti||16;
  const ds=new Date(t.data+'T12:00:00').toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  const modalita=t.modalita==='round_robin'?'🔄 Round Robin Doppio':'⚡ Eliminazione Diretta Doppio';
  const isc=currentUser&&(t.iscritti||[]).includes(currentUser.uid);
  const full=cnt>=max;
  var sb='';
  if(t.status==='open')sb='<span class="status-badge status-open" style="font-size:13px;">Iscrizioni aperte</span>';
  else if(t.status==='ongoing')sb='<span class="status-badge status-ongoing" style="font-size:13px;">🔴 In corso</span>';
  else if(t.status==='finished')sb='<span class="status-badge status-finished" style="font-size:13px;">✅ Concluso</span>';
  var iscBtn='';
  if(!currentUser)iscBtn='<a href="index.html" class="btn-iscriviti">Accedi per iscriverti</a>';
  else if(isc)iscBtn='<span class="btn-iscritto">✓ Sei iscritto</span>';
  else if(t.status==='open'&&!full)iscBtn='<button class="btn-iscriviti" onclick="iscriviTorneo(\''+t.id+'\')">Iscriviti al torneo</button>';
  else iscBtn='<button class="btn-iscriviti" disabled>Iscrizioni chiuse</button>';
  document.getElementById('detail-hero').innerHTML=
    '<div class="detail-hero-sport">'+sportEmoji(t.sport)+'</div>'+
    '<div class="detail-hero-name">'+t.nome+'</div>'+
    '<div class="detail-hero-meta">'+ds+' · '+sportLabel(t.sport)+' · '+modalita+'</div>'+
    '<div class="detail-hero-stats">'+
    '<div class="detail-stat"><div class="detail-stat-val">'+cnt+'</div><div class="detail-stat-lbl">Iscritti</div></div>'+
    '<div class="detail-stat"><div class="detail-stat-val">'+max+'</div><div class="detail-stat-lbl">Max</div></div>'+
    '<div class="detail-stat"><div class="detail-stat-val">'+(t.matches||[]).length+'</div><div class="detail-stat-lbl">Partite</div></div>'+
    '</div>'+

async function loadIscrittiNames(t){
  const uids=t.iscritti||[];
  if(!uids.length)return{};
  try{
    const snaps=await Promise.all(uids.map(function(uid){return db.collection('users').doc(uid).get();}));
    var map={};
    snaps.forEach(function(s){if(s.exists)map[s.id]=s.data().name||s.id;});
    return map;
  }catch(e){return{};}

    uids.map(function(uid,i){
      const nm=names[uid]||uid;

function drawLines(uid){
  var stage=document.getElementById(uid);
  if(!stage)return;
  var stageRect=stage.getBoundingClientRect();
  var svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
  svg.setAttribute('style','position:absolute;top:0;left:0;width:'+stage.scrollWidth+'px;height:'+stage.scrollHeight+'px;pointer-events:none;overflow:visible;');
  var rounds=stage.querySelectorAll('.b-round');
  rounds.forEach(function(rEl,ri){
    if(ri>=rounds.length-1)return;
    var ms=rEl.querySelectorAll('.b-match');
    var nEl=rounds[ri+1];
    var nms=nEl?nEl.querySelectorAll('.b-match'):[];
    var sRect=stage.getBoundingClientRect();
    for(var i=0;i<ms.length;i+=2){
      var m1=ms[i],m2=ms[i+1]||ms[i],nm=nms[Math.floor(i/2)];
      if(!nm)continue;
      var r1=m1.getBoundingClientRect(),r2=m2.getBoundingClientRect(),rn=nm.getBoundingClientRect();
      var x1=r1.right-sRect.left,y1=r1.top+r1.height/2-sRect.top;
      var y2=r2.top+r2.height/2-sRect.top;
      var xn=rn.left-sRect.left,yn=rn.top+rn.height/2-sRect.top;
      var mx=(x1+xn)/2;
      var path=document.createElementNS('http://www.w3.org/2000/svg','path');
      path.setAttribute('d','M '+x1+' '+y1+' L '+mx+' '+y1+' L '+mx+' '+y2+' L '+mx+' '+yn+' L '+xn+' '+yn);
      path.setAttribute('fill','none');
      path.setAttribute('stroke','rgba(74,222,128,0.18)');
      path.setAttribute('stroke-width','1.5');
      path.setAttribute('stroke-linecap','round');
      path.setAttribute('stroke-linejoin','round');
      var len=path.getTotalLength?path.getTotalLength():500;
      path.style.strokeDasharray=len;
      path.style.strokeDashoffset=len;
      path.style.transition='stroke-dashoffset 0.8s ease '+(ri*0.3)+'s';
      svg.appendChild(path);
      (function(p){requestAnimationFrame(function(){setTimeout(function(){p.style.strokeDashoffset='0';},50);});})(path);
    }
  });
  stage.style.position='relative';
  stage.appendChild(svg);
}

async function aggiornaClassificaGironi(t,m){
  const gironi=t.gironi||{};
  const players=t.iscritti||[];

  // Round Robin doppio: classifica individuale
  // Ogni giocatore guadagna punti in base alla vittoria/sconfitta della sua coppia
  if(t.modalita==='round_robin'){
    var cls={};
    players.forEach(function(p){cls[p]={uid:p,vinte:0,perse:0,punti:0,partite:0};});
    (t.matches||[]).forEach(function(mx){
      if(mx.fase!=='girone'||mx.score1==null||mx.score2==null)return;
      var coppia1=[mx.p1a,mx.p1b].filter(Boolean);
      var coppia2=[mx.p2a,mx.p2b].filter(Boolean);
      var c1wins=mx.score1>mx.score2;
      coppia1.forEach(function(p){
        if(!cls[p])return;
        cls[p].partite++;
        if(c1wins){cls[p].vinte++;cls[p].punti+=3;}
        else{cls[p].perse++;}
      });
      coppia2.forEach(function(p){
        if(!cls[p])return;
        cls[p].partite++;
        if(!c1wins){cls[p].vinte++;cls[p].punti+=3;}
        else{cls[p].perse++;}
      });
    });
    var sorted=Object.values(cls).sort(function(a,b){
      if(b.punti!==a.punti)return b.punti-a.punti;
      return b.vinte-a.vinte;
    });
    gironi['Round Robin']={players:players,classifica:sorted};
    t.gironi=gironi;
    await db.collection('tornei').doc(t.id).update({gironi:gironi});
    return;
  }

  // Fallback per gironi standard
  Object.keys(gironi).forEach(function(gKey){
    const g=gironi[gKey];
    if(!(g.players||[]).includes(m.p1)||(!(g.players||[]).includes(m.p2)))return;
    var cls={};
    (g.players||[]).forEach(function(p){cls[p]={uid:p,vinte:0,perse:0,punti:0};});
    (t.matches||[]).forEach(function(mx){
      if(!(g.players||[]).includes(mx.p1)||mx.score1==null)return;
      if(mx.score1>mx.score2){cls[mx.p1].vinte++;cls[mx.p1].punti+=3;cls[mx.p2].perse++;}
      else if(mx.score2>mx.score1){cls[mx.p2].vinte++;cls[mx.p2].punti+=3;cls[mx.p1].perse++;}
    });
    gironi[gKey].classifica=Object.values(cls).sort(function(a,b){return b.punti-a.punti;});
  });
  t.gironi=gironi;
  await db.collection('tornei').doc(t.id).update({gironi:gironi});
}

async function avviaTorneo(tid){
  const t=allTornei.find(function(x){return x.id===tid;});if(!t)return;
  const cnt=(t.iscritti||[]).length;
  if(cnt<4){showToast('Servono almeno 4 iscritti!',true);return;}
  if(cnt%2!==0){showToast('Servono un numero pari di iscritti per il doppio!',true);return;}
  showLoading();
  try{
    var matches=[],gironi={},coppie=[];
    const players=shuffle(t.iscritti||[]);
    const nCoppie=Math.floor(cnt/2);

    if(t.modalita==='round_robin'){
      // ═══ ROUND ROBIN DOPPIO ═══
      // 1. Genera tutte le combinazioni possibili di coppie per ogni partita
      //    Ogni partita: coppia A (p1a+p1b) vs coppia B (p2a+p2b)
      //    I partner cambiano ogni partita — classifica individuale
      //
      // Algoritmo: genera schedule round-robin per N giocatori
      // Ogni round abbina i giocatori a coppie diverse
      //
      // Per N giocatori, ci sono N-1 round (se N pari)
      // In ogni round, ogni giocatore ha un partner diverso e affronta coppie diverse

      var N=cnt;
      var plist=players.slice();
      // Round robin scheduling (circle method)
      var fixed=plist[0];
      var rotating=plist.slice(1);
      var schedule=[]; // array di round, ogni round = array di match [{p1a,p1b,p2a,p2b}]

      for(var r=0;r<N-1;r++){
        var roundArr=rotating.slice();
        var allP=[fixed].concat(roundArr);
        var roundMatches=[];
        for(var i=0;i<Math.floor(N/2);i++){
          var p1a=allP[i];
          var p1b=allP[N-1-i];
          if(i+1<N-1-i){
            // valid pair
            roundMatches.push({p1a:p1a,p1b:p1b});
          }
        }
        // Now pair the round matches into games: pair[0] vs pair[1], pair[2] vs pair[3] etc
        for(var i=0;i<roundMatches.length-1;i+=2){
          var ma=roundMatches[i],mb=roundMatches[i+1];
          if(ma&&mb){
            schedule.push({
              round:'Round '+(r+1),
              p1a:ma.p1a,p1b:ma.p1b,
              p2a:mb.p1a,p2b:mb.p1b
            });
          }
        }
        // rotate
        rotating.push(rotating.shift());
      }

      // Se schedule vuoto (pochi giocatori), usa fallback semplice
      if(!schedule.length){
        // Fallback: genera tutte le combinazioni di coppie possibili
        var allPairs=[];
        for(var i=0;i<cnt;i++)
          for(var j=i+1;j<cnt;j++)
            allPairs.push([players[i],players[j]]);
        // Match: tutte le coppie possibili vs altre coppie (senza ripetizioni)
        var used=new Set();
        for(var i=0;i<allPairs.length;i++){
          for(var j=i+1;j<allPairs.length;j++){
            var pa=allPairs[i],pb=allPairs[j];
            // No player in common
            if(pa[0]===pb[0]||pa[0]===pb[1]||pa[1]===pb[0]||pa[1]===pb[1])continue;
            var key=[pa[0],pa[1],pb[0],pb[1]].sort().join('_');
            if(used.has(key))continue;
            used.add(key);
            schedule.push({round:'Round '+(schedule.length+1),p1a:pa[0],p1b:pa[1],p2a:pb[0],p2b:pb[1]});
          }
        }
      }

      // Inizializza classifica individuale
      var cls={};
      players.forEach(function(p){cls[p]={uid:p,vinte:0,perse:0,punti:0,partite:0};});
      gironi['Round Robin']={players:players,classifica:Object.values(cls)};

      // Genera i match
      schedule.forEach(function(s,idx){
        matches.push({
          id:'rr'+idx+'_'+Date.now().toString(36)+Math.random().toString(36).substr(2,3),
          p1a:s.p1a,p1b:s.p1b,  // coppia 1
          p2a:s.p2a,p2b:s.p2b,  // coppia 2
          // mantieni p1/p2 per compatibilità display (usa p1a come riferimento)
          p1:s.p1a,p2:s.p2a,
          round:s.round,fase:'girone',
          score1:null,score2:null,format:'1set',
          tipo:'doppio_rr'
        });
      });

      // Slot finale
      matches.push({id:'fin_'+Date.now().toString(36),
        p1:null,p1a:null,p1b:null,p2:null,p2a:null,p2b:null,
        round:'Finale',fase:'finale',score1:null,score2:null,format:'2set',tipo:'doppio'});

    } else {
      // ═══ ELIMINAZIONE DIRETTA DOPPIO ═══
      // Sorteggio casuale → coppie fisse per tutto il torneo
      // N giocatori → N/2 coppie → bracket a eliminazione diretta tra coppie
      for(var i=0;i<players.length;i+=2){
        coppie.push({p1:players[i],p2:players[i+1]||null});
      }
      // Bracket tra coppie
      var roundCoppie=coppie.slice();
      while(roundCoppie.length>1){
        const rName=getRoundName(roundCoppie.length);
        var next=[];
        for(var i=0;i<roundCoppie.length;i+=2){
          var ca=roundCoppie[i],cb=roundCoppie[i+1]||{p1:null,p2:null};
          matches.push({
            id:'e'+i+'_'+Date.now().toString(36)+Math.random().toString(36).substr(2,3),
            // coppia A
            p1a:ca.p1,p1b:ca.p2,
            // coppia B
            p2a:cb.p1,p2b:cb.p2,
            // per compatibilità
            p1:ca.p1,p2:cb.p1,
            round:rName,fase:'elim',
            score1:null,score2:null,format:'2set',
            slot:Math.floor(i/2),tipo:'doppio'
          });
          next.push({p1:null,p2:null});
        }
        roundCoppie=next;
        if(roundCoppie.length<=1)break;
      }
    }

    await db.collection('tornei').doc(tid).update({
      status:'ongoing',matches:matches,gironi:gironi,coppie:coppie
    });
    t.status='ongoing';t.matches=matches;t.gironi=gironi;t.coppie=coppie;
    hideLoading();showToast('🚀 Torneo avviato! Tabellone doppio generato.');
    await renderDetail(t);renderTorneiGrid();
  }catch(e){hideLoading();showToast('Errore: '+e.message,true);}
}

async function concludiTorneo(tid){
  if(!confirm('Concludere il torneo?'))return;
  showLoading();
  try{
    await db.collection('tornei').doc(tid).update({status:'finished'});
    const t=allTornei.find(function(x){return x.id===tid;});if(t)t.status='finished';
    hideLoading();showToast('🏆 Torneo concluso!');
    await renderDetail(t||currentTorneo);renderTorneiGrid();
  }catch(e){hideLoading();showToast('Errore: '+e.message,true);}
}

async function deleteTorneo(tid){
  if(!confirm('Eliminare definitivamente questo torneo?'))return;
  showLoading();
  try{
    await db.collection('tornei').doc(tid).delete();
    allTornei=allTornei.filter(function(t){return t.id!==tid;});
    hideLoading();showToast('Torneo eliminato');showList();renderTorneiGrid();
  }catch(e){hideLoading();showToast('Errore: '+e.message,true);}
}

function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}
function getRoundName(n){if(n<=2)return 'Finale';if(n<=4)return 'Semifinale';if(n<=8)return 'Quarti di Finale';if(n<=16)return 'Ottavi di Finale';if(n<=32)return 'Sedicesimi';return 'Primo Turno';}

async function aggiornaFinaliRoundRobin(t){
  const matches=t.matches||[];
  const gironeMaches=matches.filter(function(m){return m.fase==='girone';});
  var allDone=gironeMaches.length>0&&gironeMaches.every(function(m){return m.score1!=null&&m.score2!=null;});
  if(!allDone)return false;

  // Round Robin doppio: prendi i migliori 2 individuali dalla classifica
  const gironi=t.gironi||{};
  var classifica=[];
  Object.keys(gironi).forEach(function(gKey){
    (gironi[gKey].classifica||[]).forEach(function(r){classifica.push(r);});
  });
  classifica.sort(function(a,b){if(b.punti!==a.punti)return b.punti-a.punti;return b.vinte-a.vinte;});

  // I migliori 2 si sfidano in finale — come coppia TBD (hanno giocato con partner diversi)
  // In finale si ri-sorteggia chi gioca con chi
  var top=classifica.slice(0,4);
  var finale=matches.find(function(m){return m.fase==='finale'&&m.round==='Finale';});
  if(finale&&top.length>=2){
    // Finale: top1+top3 vs top2+top4 (oppure semplicemente i migliori 2)
    if(top.length>=4){
      finale.p1a=top[0].uid;finale.p1b=top[2].uid;
      finale.p2a=top[1].uid;finale.p2b=top[3].uid;
      finale.p1=top[0].uid;finale.p2=top[1].uid;
    } else {
      finale.p1a=top[0].uid;finale.p1b=null;
      finale.p2a=top[1]?top[1].uid:null;finale.p2b=null;
      finale.p1=top[0].uid;finale.p2=top[1]?top[1].uid:null;
    }
    await db.collection('tornei').doc(t.id).update({matches:matches});
    t.matches=matches;
    showToast('🏆 Round Robin completato! Finale generata con i migliori 4 giocatori.');
    return true;
  }
  return false;
}

async function avanzaEliminazioneDiretta(t,matchId){
  // Dopo ogni risultato in elim diretta, propaga il vincitore al turno successivo
  const matches=t.matches||[];
  const m=matches.find(function(x){return x.id===matchId;});
  if(!m||m.score1==null||m.score2==null)return;
  const winner=m.score1>m.score2?m.p1:m.p2;
  const roundOrder=['Primo Turno','Sedicesimi','Ottavi di Finale','Quarti di Finale','Semifinale','Finale'];
  const currIdx=roundOrder.indexOf(m.round);
  if(currIdx<0||currIdx>=roundOrder.length-1)return;
  const nextRound=roundOrder[currIdx+1];
  // Trova i match del round corrente per calcolare la posizione
  const currRoundMatches=matches.filter(function(x){return x.round===m.round&&x.fase==='elim';});
  const posInRound=currRoundMatches.findIndex(function(x){return x.id===matchId;});
  const nextSlot=Math.floor(posInRound/2);
  const nextMatches=matches.filter(function(x){return x.round===nextRound&&x.fase==='elim';});
  if(nextMatches[nextSlot]){
    if(posInRound%2===0)nextMatches[nextSlot].p1=winner;
    else nextMatches[nextSlot].p2=winner;
    await db.collection('tornei').doc(t.id).update({matches:matches});
    t.matches=matches;
  }
}

/* ── HERO STATS COUNTER ── */
function animateCount(el,target,duration){
  var start=0,step=target/((duration/16));
  var id=setInterval(function(){
    start+=step;
    if(start>=target){start=target;clearInterval(id);}
    el.textContent=Math.floor(start);
  },16);
}
function updateHeroStats(){
  var nT=allTornei.length;
  var nI=allTornei.reduce(function(a,t){return a+(t.iscritti||[]).length;},0);
  var nP=allTornei.reduce(function(a,t){return a+(t.matches||[]).filter(function(m){return m.score1!=null;}).length;},0);
  animateCount(document.getElementById('stat-tornei'),nT,600);
  animateCount(document.getElementById('stat-iscritti'),nI,800);
  animateCount(document.getElementById('stat-partite'),nP,700);
  var pill=document.getElementById('live-pill');
  if(pill)pill.style.display=allTornei.some(function(t){return t.status==='ongoing';})?'flex':'none';
}
