<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tornei — Play Padel Biccari</title>
<meta name="theme-color" content="#0F5132">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --verde:#1a6b2a;--verde2:#228b22;--verde3:#2d9e4e;--verde-light:#e8f5e9;
  --oro:#b8860b;--oro2:#d4a017;--bianco:#1c2b1e;--grigio2:#6b7e6d;
  --card-bg:#ffffff;--surface:#f0ece4;--border:rgba(28,43,30,0.10);
  --danger:#c0392b;--radius:14px;--radius-lg:22px;--bg-page:#f4f1eb;
  --shadow:0 4px 24px rgba(28,43,30,0.09);
  --shadow-lg:0 12px 48px rgba(28,43,30,0.16);
  --shadow-xl:0 24px 80px rgba(28,43,30,0.20);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg-page);color:var(--bianco);min-height:100vh;}
/* TOPBAR */
#topbar{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;height:64px;background:rgba(244,241,235,0.88);backdrop-filter:blur(28px) saturate(1.8);border-bottom:1px solid rgba(28,43,30,0.08);box-shadow:0 4px 20px rgba(28,43,30,0.05);}
.topbar-logo{display:flex;align-items:center;gap:10px;cursor:pointer;text-decoration:none;}
.topbar-logo img{width:32px;height:32px;border-radius:6px;}
.topbar-logo-text{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--verde);letter-spacing:1px;}
.back-btn{display:flex;align-items:center;gap:8px;background:none;border:1.5px solid var(--border);color:var(--bianco);padding:8px 16px;border-radius:50px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;text-decoration:none;}
.back-btn:hover{background:var(--verde-light);border-color:var(--verde);color:var(--verde);}
#user-chip{display:flex;align-items:center;gap:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:50px;padding:5px 14px 5px 5px;font-size:14px;font-weight:500;}
.user-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--verde),var(--verde2));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:white;}
main{padding-top:64px;}
/* HERO */
.tornei-hero{background:linear-gradient(160deg,#0a1a0a 0%,#0f2a14 50%,#1a3a1a 100%);padding:4rem 2rem 3rem;text-align:center;position:relative;overflow:hidden;}
.tornei-hero::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(26,107,42,0.35) 0%,transparent 70%);pointer-events:none;}
.tornei-hero-eyebrow{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(74,222,128,0.8);margin-bottom:1rem;display:flex;align-items:center;justify-content:center;gap:8px;}
.tornei-hero-eyebrow::before,.tornei-hero-eyebrow::after{content:'';display:inline-block;width:30px;height:1px;background:linear-gradient(90deg,transparent,rgba(74,222,128,0.5));}
.tornei-hero-eyebrow::after{background:linear-gradient(90deg,rgba(74,222,128,0.5),transparent);}
.tornei-hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(64px,10vw,120px);color:white;letter-spacing:4px;line-height:0.9;text-shadow:0 4px 40px rgba(0,0,0,0.5);}
.tornei-hero h1 span{color:#4ade80;}
.tornei-hero-sub{font-size:16px;color:rgba(255,255,255,0.6);margin-top:1rem;}
/* FILTER */
.filter-bar{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:1.5rem 2rem 0;}
.filter-tab{background:var(--card-bg);border:1.5px solid var(--border);color:var(--grigio2);padding:8px 20px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.22s;}
.filter-tab:hover{background:var(--verde-light);border-color:var(--verde);color:var(--verde);}
.filter-tab.active{background:linear-gradient(135deg,var(--verde),var(--verde2));border-color:transparent;color:white;box-shadow:0 4px 14px rgba(26,107,42,0.3);}
/* GRID */
.tornei-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.5rem;padding:2rem;max-width:1200px;margin:0 auto;}
/* CARD */
.torneo-card{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);box-shadow:var(--shadow);cursor:pointer;position:relative;}
.torneo-card:hover{transform:translateY(-8px) scale(1.01);box-shadow:var(--shadow-xl);border-color:var(--verde2);}
.torneo-card-header{padding:1.5rem 1.5rem 1rem;background:linear-gradient(135deg,#0a1a0a,#1a3a1a);position:relative;overflow:hidden;}
.torneo-card-header::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;background:radial-gradient(circle,rgba(74,222,128,0.12) 0%,transparent 70%);}
.torneo-sport-icon{font-size:36px;margin-bottom:0.75rem;display:block;}
.torneo-card-name{font-size:20px;font-weight:700;color:white;margin-bottom:4px;}
.torneo-card-desc{font-size:13px;color:rgba(255,255,255,0.55);}
.torneo-card-body{padding:1.25rem 1.5rem;}
.torneo-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem;}
.torneo-stat{background:var(--surface);border-radius:10px;padding:10px 8px;text-align:center;}
.torneo-stat-val{font-size:18px;font-weight:800;color:var(--verde);}
.torneo-stat-lbl{font-size:10px;color:var(--grigio2);text-transform:uppercase;letter-spacing:0.5px;margin-top:2px;}
.torneo-progress-bar{background:var(--surface);border-radius:50px;height:6px;overflow:hidden;margin-bottom:1rem;}
.torneo-progress-fill{height:100%;border-radius:50px;background:linear-gradient(90deg,var(--verde),var(--verde3));transition:width 0.6s ease;}
.torneo-card-footer{display:flex;align-items:center;justify-content:space-between;padding:0.75rem 1.5rem 1.25rem;}
/* STATUS */
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:50px;font-size:12px;font-weight:700;}
.status-open{background:rgba(26,107,42,0.12);color:var(--verde);}
.status-open::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--verde);display:inline-block;animation:pulse 1.5s infinite;}
.status-closed{background:rgba(184,134,11,0.12);color:var(--oro);}
.status-ongoing{background:rgba(230,57,70,0.1);color:#e63946;}
.status-finished{background:var(--surface);color:var(--grigio2);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.btn-vai{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,var(--verde),var(--verde2));color:white;border:none;padding:8px 18px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;box-shadow:0 4px 12px rgba(26,107,42,0.3);}
.btn-vai:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(26,107,42,0.4);}
/* DETAIL */
#detail-page{display:none;padding:2rem;max-width:1200px;margin:0 auto;}
.detail-hero{background:linear-gradient(135deg,#0a1a0a,#1a3a1a);border-radius:var(--radius-lg);padding:2.5rem;margin-bottom:2rem;position:relative;overflow:hidden;}
.detail-hero::before{content:'';position:absolute;top:-80px;right:-80px;width:300px;height:300px;background:radial-gradient(circle,rgba(74,222,128,0.15) 0%,transparent 70%);}
.detail-hero-sport{font-size:48px;margin-bottom:1rem;}
.detail-hero-name{font-family:'Bebas Neue',sans-serif;font-size:clamp(36px,6vw,64px);color:white;letter-spacing:2px;}
.detail-hero-meta{font-size:14px;color:rgba(255,255,255,0.6);margin-top:0.5rem;}
.detail-hero-stats{display:flex;gap:1.5rem;margin-top:1.5rem;flex-wrap:wrap;}
.detail-stat{background:rgba(255,255,255,0.08);border-radius:12px;padding:12px 20px;text-align:center;min-width:80px;}
.detail-stat-val{font-size:22px;font-weight:800;color:#4ade80;}
.detail-stat-lbl{font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;}
/* TABS */
.detail-tabs{display:flex;gap:4px;background:var(--surface);border-radius:50px;padding:4px;margin-bottom:2rem;width:fit-content;}
.detail-tab{padding:10px 24px;border-radius:50px;font-size:14px;font-weight:600;border:none;background:none;cursor:pointer;color:var(--grigio2);transition:all 0.2s;}
.detail-tab.active{background:linear-gradient(135deg,var(--verde),var(--verde2));color:white;box-shadow:0 4px 12px rgba(26,107,42,0.3);}
/* ISCRITTI */
.iscritti-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-bottom:1.5rem;}
.iscritto-card{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow);}
.iscritto-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--verde),var(--verde2));display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:white;flex-shrink:0;}
.iscritto-name{font-size:14px;font-weight:600;}
/* BRACKET */
.bracket-container{overflow-x:auto;padding-bottom:1rem;}
.bracket{display:flex;gap:0;min-width:fit-content;}
.bracket-round{display:flex;flex-direction:column;justify-content:space-around;min-width:200px;padding:0 1rem;position:relative;}
.bracket-round-title{text-align:center;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--grigio2);margin-bottom:1rem;padding-bottom:0.5rem;border-bottom:1px solid var(--border);}
.bracket-match{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;margin:8px 0;box-shadow:var(--shadow);transition:all 0.2s;position:relative;}
.bracket-match:hover{border-color:var(--verde2);box-shadow:var(--shadow-lg);}
.bracket-match.match-done{border-color:rgba(26,107,42,0.3);}
.bracket-player{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;gap:8px;}
.bracket-player+.bracket-player{border-top:1px solid var(--border);}
.bracket-player-name{font-size:13px;font-weight:500;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bracket-player.winner .bracket-player-name{font-weight:700;color:var(--verde);}
.bracket-player.winner{background:rgba(26,107,42,0.05);}
.bracket-score{font-size:14px;font-weight:800;min-width:24px;text-align:center;color:var(--grigio2);}
.bracket-score.winning{color:var(--verde);}
.bracket-match-label{position:absolute;top:4px;right:6px;font-size:9px;font-weight:700;text-transform:uppercase;color:var(--grigio2);letter-spacing:0.5px;}
.bracket-tbd{color:var(--grigio2);font-style:italic;}
/* GIRONI */
.gironi-container{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.5rem;}
.girone-card{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);}
.girone-header{background:linear-gradient(135deg,var(--verde),var(--verde2));padding:1rem 1.25rem;color:white;font-size:15px;font-weight:700;}
.girone-table{width:100%;border-collapse:collapse;}
.girone-table th{background:var(--surface);padding:8px 12px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--grigio2);text-align:center;}
.girone-table th:first-child{text-align:left;}
.girone-table td{padding:10px 12px;font-size:13px;border-top:1px solid var(--border);text-align:center;}
.girone-table td:first-child{text-align:left;font-weight:600;}
.girone-table tr:first-child td{background:rgba(26,107,42,0.06);}
.girone-table tr:first-child td:first-child{color:var(--verde);}
/* MATCHES */
.matches-list{display:flex;flex-direction:column;gap:12px;}
.match-item{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;box-shadow:var(--shadow);transition:all 0.2s;}
.match-item:hover{border-color:var(--verde2);box-shadow:var(--shadow-lg);}
.match-teams{display:flex;align-items:center;gap:12px;flex:1;}
.match-team{font-size:14px;font-weight:600;flex:1;}
.match-team.right{text-align:right;}
.match-team.winner{color:var(--verde);}
.match-vs-badge{background:var(--surface);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;color:var(--grigio2);}
.match-score-display{font-size:22px;font-weight:800;color:var(--bianco);background:var(--surface);border-radius:10px;padding:6px 16px;letter-spacing:2px;}
.match-round-badge{background:rgba(26,107,42,0.1);color:var(--verde);padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;}
.score-input-row{display:flex;align-items:center;gap:8px;}
.score-inp{width:48px;height:40px;text-align:center;background:var(--surface);border:1.5px solid var(--border);border-radius:10px;font-size:18px;font-weight:700;color:var(--bianco);font-family:inherit;}
.score-inp:focus{outline:none;border-color:var(--verde);background:white;}
.btn-save{background:linear-gradient(135deg,var(--verde),var(--verde2));color:white;border:none;padding:8px 16px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 3px 10px rgba(26,107,42,0.3);transition:all 0.2s;}
.btn-save:hover{transform:translateY(-1px);}
/* ADMIN */
.admin-panel{background:linear-gradient(135deg,#fffdf5,#f5fdf5);border:1.5px solid rgba(184,134,11,0.2);border-radius:var(--radius-lg);padding:2rem;margin-bottom:2rem;box-shadow:var(--shadow);position:relative;overflow:hidden;}
.admin-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--oro),var(--oro2),var(--verde3));}
.admin-title{font-size:15px;font-weight:700;color:var(--bianco);margin-bottom:1.25rem;display:flex;align-items:center;gap:8px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--grigio2);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.form-input,.form-select{width:100%;padding:10px 14px;background:white;border:1.5px solid var(--border);border-radius:var(--radius);font-size:14px;color:var(--bianco);font-family:inherit;transition:all 0.2s;}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--verde);box-shadow:0 0 0 3px rgba(26,107,42,0.1);}
.btn-main{background:linear-gradient(135deg,var(--verde),var(--verde2));color:white;padding:12px 24px;border-radius:50px;font-size:14px;font-weight:600;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(26,107,42,0.3);transition:all 0.25s;}
.btn-main:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(26,107,42,0.38);}
.btn-secondary{background:var(--card-bg);border:1.5px solid var(--border);color:var(--bianco);padding:10px 20px;border-radius:50px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;text-decoration:none;display:inline-block;}
.btn-secondary:hover{background:var(--verde-light);border-color:var(--verde);color:var(--verde);}
.btn-danger{background:rgba(192,57,43,0.08);border:1.5px solid rgba(192,57,43,0.3);color:var(--danger);padding:8px 16px;border-radius:50px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s;}
.btn-danger:hover{background:rgba(192,57,43,0.15);}
/* EMPTY */
.empty-state{text-align:center;padding:4rem 2rem;color:var(--grigio2);}
.empty-state .emoji{font-size:64px;margin-bottom:1rem;display:block;}
.empty-state h3{font-size:20px;font-weight:700;color:var(--bianco);margin-bottom:0.5rem;}
/* TOAST */
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(24px);background:#1c2b1e;color:white;padding:13px 28px;border-radius:50px;font-size:14px;font-weight:600;opacity:0;pointer-events:none;transition:all 0.35s cubic-bezier(0.34,1.56,0.64,1);z-index:9999;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.25);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
/* LOADING */
#loading-overlay{position:fixed;inset:0;background:rgba(244,241,235,0.85);backdrop-filter:blur(8px);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:1rem;}
.spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--verde);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
/* PODIO */
.podio{display:flex;align-items:flex-end;justify-content:center;gap:1rem;padding:2rem 0;margin-bottom:2rem;}
.podio-step{display:flex;flex-direction:column;align-items:center;gap:8px;}
.podio-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:white;}
.podio-avatar.gold{background:linear-gradient(135deg,#b8860b,#d4a017);box-shadow:0 4px 16px rgba(184,134,11,0.4);}
.podio-avatar.silver{background:linear-gradient(135deg,#8a9ab0,#aabbc0);box-shadow:0 4px 16px rgba(138,154,176,0.4);}
.podio-avatar.bronze{background:linear-gradient(135deg,#8b4513,#cd853f);box-shadow:0 4px 16px rgba(139,69,19,0.4);}
.podio-name{font-size:13px;font-weight:700;text-align:center;}
.podio-medal{font-size:28px;}
.podio-bar{border-radius:12px 12px 0 0;width:80px;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;}
.podio-bar.gold{background:linear-gradient(180deg,rgba(212,160,23,0.2),rgba(212,160,23,0.05));height:100px;}
.podio-bar.silver{background:linear-gradient(180deg,rgba(170,187,192,0.2),rgba(170,187,192,0.05));height:70px;}
.podio-bar.bronze{background:linear-gradient(180deg,rgba(205,133,63,0.2),rgba(205,133,63,0.05));height:50px;}
.btn-iscriviti{background:linear-gradient(135deg,var(--verde),var(--verde2));color:white;border:none;padding:10px 22px;border-radius:50px;font-size:14px;font-weight:600;cursor:pointer;box-shadow:0 4px 14px rgba(26,107,42,0.3);transition:all 0.2s;}
.btn-iscriviti:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(26,107,42,0.4);}
.btn-iscriviti:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-iscritto{background:rgba(26,107,42,0.1);color:var(--verde);border:1.5px solid rgba(26,107,42,0.2);padding:8px 18px;border-radius:50px;font-size:14px;font-weight:600;}
@media(max-width:768px){.tornei-grid{grid-template-columns:1fr;padding:1rem;}.detail-tabs{overflow-x:auto;white-space:nowrap;}.match-item{flex-direction:column;}.bracket-round{min-width:160px;}}
</style>
</head>
<body>
<div id="topbar">
  <a class="topbar-logo" href="index.html">
    <img src="apple-touch-icon.png" alt="logo" onerror="this.style.display='none'">
    <span class="topbar-logo-text">PLAY PADEL BICCARI</span>
  </a>
  <a class="back-btn" href="index.html">← Home</a>
  <div id="user-chip" style="display:none;">
    <div class="user-avatar" id="user-initial">G</div>
    <span id="user-name-chip">Utente</span>
  </div>
</div>
<main>
  <div id="list-page">
    <div class="tornei-hero">
      <div class="tornei-hero-eyebrow">Play Padel Biccari</div>
      <h1>TOR<span>NEI</span></h1>
      <p class="tornei-hero-sub">Iscriviti, gioca e porta a casa il trofeo</p>
    </div>
    <div class="filter-bar">
      <button class="filter-tab active" onclick="setFilter('all',this)">🏆 Tutti</button>
      <button class="filter-tab" onclick="setFilter('open',this)">🟢 Iscrizioni aperte</button>
      <button class="filter-tab" onclick="setFilter('ongoing',this)">🔴 In corso</button>
      <button class="filter-tab" onclick="setFilter('finished',this)">✅ Conclusi</button>
    </div>
    <div class="tornei-grid" id="tornei-grid">
      <div class="empty-state"><span class="emoji">⏳</span><h3>Caricamento...</h3></div>
    </div>
  </div>
  <div id="detail-page">
    <div style="padding:1.5rem 2rem 0;max-width:1200px;margin:0 auto;">
      <button class="btn-secondary" onclick="showList()">← Torna ai tornei</button>
    </div>
    <div style="padding:1.5rem 2rem;max-width:1200px;margin:0 auto;">
      <div class="detail-hero" id="detail-hero"></div>
      <div id="admin-actions" style="display:none;"></div>
      <div class="detail-tabs" id="detail-tabs">

function renderBracketElim(t,names,el,podioHTML){
  const matches=t.matches||[];
  if(!matches.length){el.innerHTML=podioHTML+'<div class="empty-state"><span class="emoji">🏆</span><h3>Nessuna partita</h3></div>';return;}
  var rounds={};
  matches.forEach(function(m){if(!rounds[m.round])rounds[m.round]=[];rounds[m.round].push(m);});
  const ro=['Fase a gironi','Ottavi','Quarti','Semifinale','Finale'];
  const sr=Object.keys(rounds).sort(function(a,b){var ia=ro.indexOf(a),ib=ro.indexOf(b);if(ia<0)ia=99;if(ib<0)ib=99;return ia-ib;});
  var html='<div class="bracket-container">'+podioHTML+'<div class="bracket">';
  sr.forEach(function(round){
    html+='<div class="bracket-round"><div class="bracket-round-title">'+round+'</div>';
    rounds[round].forEach(function(m){
      const hs=m.score1!=null&&m.score2!=null,w1=hs&&m.score1>m.score2,w2=hs&&m.score2>m.score1;
      const p1=names[m.p1]||m.p1||'TBD',p2=names[m.p2]||m.p2||'TBD';
      html+='<div class="bracket-match'+(hs?' match-done':'')+'">'+(hs?'<div class="bracket-match-label">✓</div>':'')+
        '<div class="bracket-player'+(w1?' winner':'')+'"><span class="bracket-player-name">'+(m.p1?p1:'<span class="bracket-tbd">TBD</span>')+'</span>'+(hs?'<span class="bracket-score'+(w1?' winning':'')+'">'+m.score1+'</span>':'')+'</div>'+
        '<div class="bracket-player'+(w2?' winner':'')+'"><span class="bracket-player-name">'+(m.p2?p2:'<span class="bracket-tbd">TBD</span>')+'</span>'+(hs?'<span class="bracket-score'+(w2?' winning':'')+'">'+m.score2+'</span>':'')+'</div>'+
        '</div>';
    });
    html+='</div>';
  });
  html+='</div></div>';el.innerHTML=html;
}

function renderBracketGironi(t,names,el,podioHTML){
  const gironi=t.gironi||{};
  if(!Object.keys(gironi).length){el.innerHTML=podioHTML+'<div class="empty-state"><span class="emoji">🔄</span><h3>Gironi non ancora generati</h3></div>';return;}
  var html=podioHTML+'<div class="gironi-container">';
  Object.keys(gironi).forEach(function(gKey){
    const g=gironi[gKey],cls=g.classifica||[];
    html+='<div class="girone-card"><div class="girone-header">'+gKey+'</div>'+
      '<table class="girone-table"><thead><tr><th>Giocatore</th><th>V</th><th>P</th><th>Pt</th></tr></thead><tbody>'+
      cls.map(function(row){return '<tr><td>'+(names[row.uid]||row.uid||'?')+'</td><td>'+(row.vinte||0)+'</td><td>'+(row.perse||0)+'</td><td style="font-weight:800;color:var(--verde);">'+(row.punti||0)+'</td></tr>';}).join('')+
      '</tbody></table></div>';
  });
  html+='</div>';el.innerHTML=html;
}

function renderTabPartite(t,names){
  const el=document.getElementById('tab-partite'),matches=t.matches||[],isAdmin=currentUser&&currentUser.isAdmin;
  if(!matches.length){el.innerHTML='<div class="empty-state"><span class="emoji">⚔️</span><h3>Nessuna partita</h3><p>Le partite appariranno qui una volta avviato il torneo.</p></div>';return;}
  el.innerHTML='<div class="matches-list">'+

      const hs=m.score1!=null&&m.score2!=null,w1=hs&&m.score1>m.score2,w2=hs&&m.score2>m.score1;
      const p1=names[m.p1]||m.p1||'TBD',p2=names[m.p2]||m.p2||'TBD';
      var scoreHTML=isAdmin?
        '<div class="score-input-row"><input class="score-inp" type="number" min="0" id="s1-'+m.id+'" value="'+(m.score1!=null?m.score1:'')+'" placeholder="0"><span style="font-size:18px;color:var(--grigio2);">–</span><input class="score-inp" type="number" min="0" id="s2-'+m.id+'" value="'+(m.score2!=null?m.score2:'')+'" placeholder="0"><button class="btn-save" onclick="saveScore(\''+t.id+'\',\''+m.id+'\')">Salva</button></div>':
        (hs?'<div class="match-score-display">'+m.score1+' – '+m.score2+'</div>':'<div style="color:var(--grigio2);font-size:13px;font-style:italic;">Da giocare</div>');
      return '<div class="match-item"><div class="match-teams"><div class="match-team'+(w1?' winner':'')+'">'+p1+'</div><div class="match-vs-badge">VS</div><div class="match-team right'+(w2?' winner':'')+'">'+p2+'</div></div><span class="match-round-badge">'+m.round+'</span>'+scoreHTML+'</div>';
    }).join('')+'</div>';
}

  ['iscritti','tabellone','partite'].forEach(function(t){document.getElementById('tab-'+t).style.display=t===tab?'block':'none';});

async function iscriviTorneo(tid){
  if(!currentUser){window.location.href='index.html';return;}
  showLoading();
  try{
    const t=allTornei.find(function(x){return x.id===tid;});
    const newI=(t.iscritti||[]).concat([currentUser.uid]);
    await db.collection('tornei').doc(tid).update({iscritti:newI});
    t.iscritti=newI;
    if(newI.length>=t.maxPartecipanti){await db.collection('tornei').doc(tid).update({status:'closed'});t.status='closed';}
    hideLoading();showToast('✅ Iscrizione confermata!');
    await renderDetail(t);renderTorneiGrid();
  }catch(e){hideLoading();showToast('Errore: '+e.message,true);}
}

async function saveScore(tid,mid){
  const t=allTornei.find(function(x){return x.id===tid;});if(!t)return;
  const m=(t.matches||[]).find(function(x){return x.id===mid;});if(!m)return;
  const s1=parseInt(document.getElementById('s1-'+mid).value),s2=parseInt(document.getElementById('s2-'+mid).value);
  if(isNaN(s1)||isNaN(s2)){showToast('Inserisci entrambi i punteggi',true);return;}
  showLoading();
  try{
    m.score1=s1;m.score2=s2;
    await db.collection('tornei').doc(tid).update({matches:t.matches});
    // Aggiorna in base alla modalità
    if(m.fase==='girone'||t.modalita==='round_robin'){
      await aggiornaClassificaGironi(t,m);
      // Controlla se tutti i gironi sono finiti → genera finali
      await aggiornaFinaliRoundRobin(t);
    } else if(m.fase==='elim'){
      await avanzaEliminazioneDiretta(t,mid);
    }
    hideLoading();showToast('✅ Risultato salvato!');
    const names=await loadIscrittiNames(t);
    renderTabPartite(t,names);renderTabTabellone(t,names);
  }catch(e){hideLoading();showToast('Errore: '+e.message,true);}
}

async function aggiornaClassificaGironi(t,m){
  const gironi=t.gironi||{};
  Object.keys(gironi).forEach(function(gKey){
    const g=gironi[gKey];
    if(!(g.players||[]).includes(m.p1)||(!(g.players||[]).includes(m.p2)))return;
    var cls={};
    (g.players||[]).forEach(function(p){cls[p]={uid:p,vinte:0,perse:0,punti:0};});
    (t.matches||[]).forEach(function(mx){
      if(!(g.players||[]).includes(mx.p1)||mx.score1==null)return;
      if(mx.score1>mx.score2){cls[mx.p1].vinte++;cls[mx.p1].punti+=3;cls[mx.p2].perse++;}
      else if(mx.score2>mx.score1){cls[mx.p2].vinte++;cls[mx.p2].punti+=3;cls[mx.p1].perse++;}
    });
    gironi[gKey].classifica=Object.values(cls).sort(function(a,b){return b.punti-a.punti;});
  });
  t.gironi=gironi;
  await db.collection('tornei').doc(t.id).update({gironi:gironi});
}

function renderAdminPanel(t){

  if(t.status==='open'||t.status==='closed')html+='<button class="btn-main" onclick="avviaTorneo(\''+t.id+'\')">🚀 Avvia Torneo e genera tabellone</button>';
  if(t.status==='ongoing')html+='<button class="btn-main" onclick="concludiTorneo(\''+t.id+'\')">🏆 Concludi Torneo</button>';
  html+='<button class="btn-danger" onclick="deleteTorneo(\''+t.id+'\')">🗑️ Elimina torneo</button></div>';
  html+='<div style="display:flex;align-items:center;gap:10px;font-size:14px;"><span style="color:var(--grigio2);font-weight:600;">Cambia stato:</span><select class="form-select" style="max-width:220px;" onchange="cambiaStatus(\''+t.id+'\',this.value)"><option value="open"'+(t.status==='open'?' selected':'')+'>🟢 Iscrizioni aperte</option><option value="closed"'+(t.status==='closed'?' selected':'')+'>🔒 Iscrizioni chiuse</option><option value="ongoing"'+(t.status==='ongoing'?' selected':'')+'>🔴 In corso</option><option value="finished"'+(t.status==='finished'?' selected':'')+'>✅ Concluso</option></select></div></div>';
  el.innerHTML=html;
}

async function cambiaStatus(tid,newStatus){
  showLoading();
  try{
    await db.collection('tornei').doc(tid).update({status:newStatus});
    const t=allTornei.find(function(x){return x.id===tid;});
    if(t)t.status=newStatus;
    hideLoading();showToast('Stato aggiornato!');
    await renderDetail(t||currentTorneo);renderTorneiGrid();
  }catch(e){hideLoading();showToast('Errore: '+e.message,true);}
}

async function avviaTorneo(tid){
  const t=allTornei.find(function(x){return x.id===tid;});if(!t)return;
  const cnt=(t.iscritti||[]).length;
  if(cnt<4){showToast('Servono almeno 4 iscritti!',true);return;}
  showLoading();
  try{
    var matches=[],gironi={};
    const players=shuffle(t.iscritti||[]);

    if(t.modalita==='round_robin'){
      // ROUND ROBIN: gironi tutti contro tutti (1 set) + finale a eliminazione
      const nG=cnt<=8?2:cnt<=12?3:cnt<=16?4:Math.ceil(cnt/4);
      const gSize=Math.ceil(cnt/nG);
      for(var g=0;g<nG;g++){
        const gP=players.slice(g*gSize,(g+1)*gSize);
        const gKey='Girone '+'ABCDEFGH'[g];
        var cls={};gP.forEach(function(p){cls[p]={uid:p,vinte:0,perse:0,punti:0};});
        gironi[gKey]={players:gP,classifica:Object.values(cls)};
        for(var i=0;i<gP.length;i++)
          for(var j=i+1;j<gP.length;j++)
            matches.push({id:'g'+g+'i'+i+'j'+j+'_'+Date.now().toString(36),
              p1:gP[i],p2:gP[j],round:gKey,fase:'girone',score1:null,score2:null,format:'1set'});
      }
      // Slot finali (TBD — si riempiono quando i gironi finiscono)
      const nQ=Math.floor(nG/2);
      for(var f=0;f<nQ;f++)
        matches.push({id:'sf'+f+'_'+Date.now().toString(36),
          p1:null,p2:null,round:nQ===1?'Finale':'Semifinale',fase:'finale',score1:null,score2:null,format:'2set'});
      if(nQ>1)
        matches.push({id:'fin_'+Date.now().toString(36),
          p1:null,p2:null,round:'Finale',fase:'finale',score1:null,score2:null,format:'2set'});
    } else {
      // ELIMINAZIONE DIRETTA: sorteggio casuale, partite al meglio di 2 set
      var roundPlayers=players.slice();
      while(roundPlayers.length>1){
        const rName=getRoundName(roundPlayers.length);
        var next=[];
        for(var i=0;i<roundPlayers.length;i+=2){
          matches.push({id:'r'+i+'_'+Date.now().toString(36)+Math.random().toString(36).substr(2,3),
            p1:roundPlayers[i],p2:roundPlayers[i+1]||null,
            round:rName,fase:'elim',score1:null,score2:null,format:'2set',slot:Math.floor(i/2)});
          next.push(null);
        }
        roundPlayers=next;
        if(roundPlayers.length<=1)break;
      }
    }

    await db.collection('tornei').doc(tid).update({status:'ongoing',matches:matches,gironi:gironi});
    t.status='ongoing';t.matches=matches;t.gironi=gironi;
    hideLoading();showToast('🚀 Torneo avviato! Tabellone generato automaticamente.');
    await renderDetail(t);renderTorneiGrid();
  }catch(e){hideLoading();showToast('Errore: '+e.message,true);}
}

async function concludiTorneo(tid){
  if(!confirm('Concludere il torneo?'))return;
  showLoading();
  try{
    await db.collection('tornei').doc(tid).update({status:'finished'});
    const t=allTornei.find(function(x){return x.id===tid;});if(t)t.status='finished';
    hideLoading();showToast('🏆 Torneo concluso!');
    await renderDetail(t||currentTorneo);renderTorneiGrid();
  }catch(e){hideLoading();showToast('Errore: '+e.message,true);}
}

async function deleteTorneo(tid){
  if(!confirm('Eliminare definitivamente questo torneo?'))return;
  showLoading();
  try{
    await db.collection('tornei').doc(tid).delete();
    allTornei=allTornei.filter(function(t){return t.id!==tid;});
    hideLoading();showToast('Torneo eliminato');showList();renderTorneiGrid();
  }catch(e){hideLoading();showToast('Errore: '+e.message,true);}
}

function shuffle(arr){var a=arr.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=a[i];a[i]=a[j];a[j]=tmp;}return a;}
function getRoundName(n){if(n<=2)return 'Finale';if(n<=4)return 'Semifinale';if(n<=8)return 'Quarti di Finale';if(n<=16)return 'Ottavi di Finale';if(n<=32)return 'Sedicesimi';return 'Primo Turno';}

async function aggiornaFinaliRoundRobin(t){
  // Quando tutti i gironi sono completati, popola le semifinali con i primi classificati
  const gironi=t.gironi||{};
  const gKeys=Object.keys(gironi);
  const matches=t.matches||[];
  var allDone=true;
  gKeys.forEach(function(gKey){
    const gm=matches.filter(function(m){return m.round===gKey&&m.fase==='girone';});
    if(!gm.every(function(m){return m.score1!=null&&m.score2!=null;}))allDone=false;
  });
  if(!allDone)return false;
  // Prendi il primo classificato per girone
  var qualificati=[];
  gKeys.forEach(function(gKey){
    const cls=gironi[gKey].classifica||[];
    if(cls.length>0)qualificati.push(cls[0].uid);
  });
  qualificati=shuffle(qualificati);
  // Popola le semifinali
  const semi=matches.filter(function(m){return m.fase==='finale'&&m.round!=='Finale';});
  semi.forEach(function(m,i){m.p1=qualificati[i*2]||null;m.p2=qualificati[i*2+1]||null;});
  await db.collection('tornei').doc(t.id).update({matches:matches});
  t.matches=matches;
  showToast('🏆 Gironi completati! Semifinali generate automaticamente.');
  return true;
}

async function avanzaEliminazioneDiretta(t,matchId){
  // Dopo ogni risultato in elim diretta, propaga il vincitore al turno successivo
  const matches=t.matches||[];
  const m=matches.find(function(x){return x.id===matchId;});
  if(!m||m.score1==null||m.score2==null)return;
  const winner=m.score1>m.score2?m.p1:m.p2;
  const roundOrder=['Primo Turno','Sedicesimi','Ottavi di Finale','Quarti di Finale','Semifinale','Finale'];
  const currIdx=roundOrder.indexOf(m.round);
  if(currIdx<0||currIdx>=roundOrder.length-1)return;
  const nextRound=roundOrder[currIdx+1];
  // Trova i match del round corrente per calcolare la posizione
  const currRoundMatches=matches.filter(function(x){return x.round===m.round&&x.fase==='elim';});
  const posInRound=currRoundMatches.findIndex(function(x){return x.id===matchId;});
  const nextSlot=Math.floor(posInRound/2);
  const nextMatches=matches.filter(function(x){return x.round===nextRound&&x.fase==='elim';});
  if(nextMatches[nextSlot]){
    if(posInRound%2===0)nextMatches[nextSlot].p1=winner;
    else nextMatches[nextSlot].p2=winner;
    await db.collection('tornei').doc(t.id).update({matches:matches});
    t.matches=matches;
  }
}
